<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meridian — Bridge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    .hidden { display: none !important; }
    #app { max-width: 42rem; margin: 0 auto; padding: 1rem 1.5rem; }
    #no-token { border-radius: 0.5rem; background: rgba(120,53,15,0.4); border: 1px solid rgba(217,119,6,0.5); padding: 1rem; color: #fde68a; }
    #no-token code { background: #1e293b; padding: 0 0.25rem; border-radius: 0.25rem; }
    header { margin-bottom: 1rem; }
    header h1 { font-size: 1.125rem; font-weight: 600; }
    .mono { font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace; font-size: 0.875rem; }
    .dim { color: #94a3b8; margin-top: 0.25rem; }
    .section { border-radius: 0.5rem; border: 1px solid #475569; background: rgba(30,41,59,0.5); padding: 1rem; margin-bottom: 1rem; }
    .section h2 { font-size: 0.875rem; font-weight: 500; color: #94a3b8; margin-bottom: 0.5rem; }
    .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; font-size: 0.875rem; }
    .meta-grid dt { color: #64748b; }
    .meta-grid dd { font-family: monospace; }
    #latest-result { font-size: 0.75rem; color: #cbd5e1; background: #0f172a; border-radius: 0.25rem; padding: 0.75rem; overflow: auto; max-height: 12rem; white-space: pre-wrap; }
    .input-row { display: flex; gap: 0.5rem; }
    .input-row input { flex: 1; padding: 0.5rem 0.75rem; border-radius: 0.375rem; background: #1e293b; border: 1px solid #475569; color: #e2e8f0; font-size: 0.875rem; }
    .btn { padding: 0.5rem 1rem; border-radius: 0.375rem; border: none; font-weight: 500; cursor: pointer; color: #fff; font-size: 0.875rem; }
    .btn-default { background: #475569; }
    .btn-default:hover { background: #64748b; }
    .btn-red { background: #b91c1c; }
    .btn-red:hover { background: #dc2626; }
    .btn-amber { background: #b45309; }
    .btn-amber:hover { background: #d97706; }
    .actions { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    #loading { color: #94a3b8; padding: 1rem 0; }
    @media (max-width: 640px) { .meta-grid { grid-template-columns: 1fr; } .input-row { flex-direction: column; } }
  </style>
</head>
<body>
  <div id="app">
    <div id="no-token" class="hidden">
      Please provide an access token (<span lang="zh">请提供访问令牌</span>). Open with <code>?thread_id=xxx&token=YOUR_TOKEN</code>.
    </div>

    <div id="content" class="hidden">
      <header>
        <h1>Bridge instance</h1>
        <p class="mono dim" id="thread-label">—</p>
      </header>

      <section class="section">
        <h2>Metadata</h2>
        <dl id="meta" class="meta-grid">
          <dt>thread_id</dt><dd class="mono" id="meta-thread">—</dd>
          <dt>type</dt><dd id="meta-type">—</dd>
          <dt>mode</dt><dd id="meta-mode">—</dd>
          <dt>status</dt><dd id="meta-status">—</dd>
          <dt>created_at</dt><dd id="meta-created">—</dd>
        </dl>
      </section>

      <section class="section">
        <h2>Latest result</h2>
        <pre id="latest-result">—</pre>
      </section>

      <section class="section">
        <label for="input-run" style="display:block;font-size:0.875rem;font-weight:500;color:#94a3b8;margin-bottom:0.5rem;">Run command</label>
        <div class="input-row">
          <input type="text" id="input-run" placeholder="Enter instruction…" />
          <button type="button" id="btn-run" class="btn btn-default">Run</button>
        </div>
      </section>

      <div class="actions">
        <button type="button" id="btn-kill" class="btn btn-red">Kill</button>
        <button type="button" id="btn-reboot" class="btn btn-amber">Reboot</button>
      </div>
    </div>

    <div id="loading">Loading…</div>
  </div>

  <script>
    (function () {
      "use strict";
      var STORAGE_KEY = "meridian_web_token";
      function getQueryParams() {
        var params = {};
        var search = typeof window.location.search === "string" ? window.location.search.slice(1) : "";
        search.split("&").forEach(function (pair) {
          var i = pair.indexOf("=");
          if (i > 0) params[decodeURIComponent(pair.slice(0, i))] = decodeURIComponent(pair.slice(i + 1));
        });
        return params;
      }
      function getToken() {
        var q = getQueryParams();
        if (q.token) return q.token.trim();
        try { var t = sessionStorage.getItem(STORAGE_KEY); return t ? t.trim() : ""; } catch (e) { return ""; }
      }
      function setToken(token) {
        try { if (token) sessionStorage.setItem(STORAGE_KEY, token); else sessionStorage.removeItem(STORAGE_KEY); } catch (e) {}
      }
      (function () { var q = getQueryParams(); if (q.token) setToken(q.token.trim()); })();
      function apiBase() {
        var origin = window.location.origin || "";
        var p = (window.location.pathname || "/").replace(/\/[^/]*$/, "") || "/";
        if (p === "/" && origin) return origin;
        return origin + (p.endsWith("/") ? p.slice(0, -1) : p);
      }
      function fetchWithAuth(url, options) {
        options = options || {};
        var headers = options.headers || {};
        if (typeof headers.append === "function" || Array.isArray(headers)) headers = {};
        var token = getToken();
        if (token) headers["Authorization"] = "Bearer " + token;
        var u = url.indexOf("/") === 0 ? apiBase() + url : url;
        return fetch(u, Object.assign({}, options, { headers: headers }));
      }
      function ensureToken() { return !!getToken(); }
      window.MeridianWeb = { getToken: getToken, setToken: setToken, apiBase: apiBase, fetchWithAuth: fetchWithAuth, ensureToken: ensureToken, getQueryParams: getQueryParams };
    })();
  </script>
  <script>
    (function () {
      var threadId = (window.MeridianWeb.getQueryParams().thread_id || "").trim();
      var noToken = document.getElementById("no-token");
      var content = document.getElementById("content");
      var loading = document.getElementById("loading");
      var threadLabel = document.getElementById("thread-label");
      var metaThread = document.getElementById("meta-thread");
      var metaType = document.getElementById("meta-type");
      var metaMode = document.getElementById("meta-mode");
      var metaStatus = document.getElementById("meta-status");
      var metaCreated = document.getElementById("meta-created");
      var latestResult = document.getElementById("latest-result");
      var inputRun = document.getElementById("input-run");
      var btnRun = document.getElementById("btn-run");
      var btnKill = document.getElementById("btn-kill");
      var btnReboot = document.getElementById("btn-reboot");

      function setMeta(inst) {
        if (!inst) return;
        threadLabel.textContent = inst.thread_id || "\u2014";
        metaThread.textContent = inst.thread_id || "\u2014";
        metaType.textContent = inst.agent_type || inst.type || "\u2014";
        metaMode.textContent = inst.mode || "\u2014";
        metaStatus.textContent = inst.status || "\u2014";
        metaCreated.textContent = inst.created_at ? new Date(inst.created_at).toLocaleString() : "\u2014";
      }

      function runCommand() {
        if (!window.MeridianWeb.ensureToken() || !threadId) return;
        var cmd = (inputRun.value || "").trim();
        if (!cmd) return;
        window.MeridianWeb.fetchWithAuth("/api/run", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ thread_id: threadId, content: cmd })
        })
          .then(function (res) { return res.json(); })
          .then(function (data) {
            latestResult.textContent = typeof data.content === "string" ? data.content : JSON.stringify(data, null, 2);
          })
          .catch(function (e) {
            latestResult.textContent = "Error: " + (e && e.message ? e.message : "network");
          });
        inputRun.value = "";
      }

      function threadAction(intent) {
        if (!window.MeridianWeb.ensureToken() || !threadId) return;
        window.MeridianWeb.fetchWithAuth("/api/" + intent, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ thread_id: threadId })
        }).then(function (res) {
          return res.json().then(function (data) {
            if (intent === "kill") {
              window.location.href = window.MeridianWeb.apiBase() + "/index.html?token=" + encodeURIComponent(window.MeridianWeb.getToken());
            } else {
              latestResult.textContent = "Reboot sent. " + (data.content || "");
            }
          });
        });
      }

      if (!threadId || !window.MeridianWeb.ensureToken()) {
        noToken.classList.remove("hidden");
        content.classList.add("hidden");
        loading.classList.add("hidden");
      } else {
        threadLabel.textContent = threadId;
        setMeta({ thread_id: threadId, mode: "bridge", status: "\u2014", created_at: null });
        window.MeridianWeb.fetchWithAuth("/api/instances")
          .then(function (res) { return res.ok ? res.json() : []; })
          .then(function (list) {
            var inst = (list || []).find(function (i) { return (i.thread_id || i.id) === threadId; });
            if (inst) setMeta(inst);
            loading.classList.add("hidden");
            content.classList.remove("hidden");
          })
          .catch(function () {
            loading.classList.add("hidden");
            content.classList.remove("hidden");
          });

        btnRun.addEventListener("click", runCommand);
        inputRun.addEventListener("keydown", function (e) {
          if (e.key === "Enter") runCommand();
        });
        btnKill.addEventListener("click", function () { threadAction("kill"); });
        btnReboot.addEventListener("click", function () { threadAction("reboot"); });
      }
    })();
  </script>
</body>
</html>
