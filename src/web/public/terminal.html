<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Meridian Terminal — Coding Agent</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --surface-color: #1e293b;
      --border-color: #334155;
      --text-color: #e2e8f0;
      --text-dim: #94a3b8;
      --accent-color: #3b82f6;
      --accent-hover: #2563eb;
      --error-color: #ef4444;
      --warning-color: #f59e0b;
      --success-color: #10b981;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .hidden { display: none !important; }

    header {
      flex-shrink: 0;
      background: var(--surface-color);
      border-bottom: 1px solid var(--border-color);
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
    }

    header h1 { font-size: 1rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .thread-badge { background: var(--bg-color); color: var(--accent-color); padding: 0.25rem 0.5rem; border-radius: 0.375rem; font-family: monospace; font-size: 0.75rem; border: 1px solid var(--border-color); }

    #main {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    #terminal-container {
      flex: 1;
      overflow: hidden;
      position: relative;
      background: #000;
    }

    #term { width: 100%; height: 100%; }

    #input-zone {
      flex-shrink: 0;
      background: var(--surface-color);
      border-top: 1px solid var(--border-color);
      padding: 0.75rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      padding-bottom: env(safe-area-inset-bottom, 0.75rem);
    }

    .hints-row {
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      padding-bottom: 0.25rem;
      -webkit-overflow-scrolling: touch;
    }

    .hints-row::-webkit-scrollbar { display: none; }

    .hint-btn {
      flex-shrink: 0;
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      color: var(--text-dim);
      padding: 0.375rem 0.75rem;
      border-radius: 1rem;
      font-size: 0.75rem;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .hint-btn:hover { background: var(--border-color); color: var(--text-color); }

    .input-row {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
    }

    .textarea-wrapper {
      flex: 1;
      position: relative;
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 0.75rem;
      padding: 0.5rem 0.75rem;
      transition: border-color 0.2s;
    }

    .textarea-wrapper:focus-within { border-color: var(--accent-color); }

    textarea {
      width: 100%;
      background: transparent;
      border: none;
      color: var(--text-color);
      font-family: inherit;
      font-size: 0.9375rem;
      resize: none;
      outline: none;
      max-height: 120px;
      line-height: 1.5;
      padding: 0;
      margin: 0;
    }

    .btn-send {
      background: var(--accent-color);
      color: white;
      border: none;
      border-radius: 50%;
      width: 2.5rem;
      height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.1s, background-color 0.2s;
    }

    .btn-send:hover { background: var(--accent-hover); }
    .btn-send:active { transform: scale(0.95); }
    .btn-send svg { width: 1.25rem; height: 1.25rem; fill: currentColor; }

    .toolbar-actions {
      display: flex;
      gap: 0.5rem;
    }

    .btn-action {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-dim);
      padding: 0.375rem 0.5rem;
      border-radius: 0.375rem;
      font-size: 0.75rem;
      cursor: pointer;
    }

    .btn-action:hover { background: var(--border-color); color: var(--text-color); }
    .btn-action.danger:hover { color: var(--error-color); border-color: var(--error-color); }

    #loading-overlay {
      position: absolute;
      inset: 0;
      background: var(--bg-color);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }

    .spinner {
      width: 2rem;
      height: 2rem;
      border: 3px solid var(--border-color);
      border-top-color: var(--accent-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #no-token-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg-color);
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 100;
    }

    .card {
      background: var(--surface-color);
      border: 1px solid var(--border-color);
      border-radius: 1rem;
      padding: 2rem;
      max-width: 400px;
      width: 100%;
    }

    .card h2 { margin-bottom: 1rem; color: var(--warning-color); }
    .card code { display: block; background: var(--bg-color); padding: 1rem; border-radius: 0.5rem; margin: 1rem 0; font-size: 0.875rem; }

    /* xterm adjustments */
    .xterm-viewport::-webkit-scrollbar { width: 8px; }
    .xterm-viewport::-webkit-scrollbar-track { background: var(--bg-color); }
    .xterm-viewport::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
  </style>
</head>
<body>
  <div id="no-token-overlay" class="hidden">
    <div class="card">
      <h2>Access Token Required</h2>
      <p>Please provide an access token to continue.</p>
      <code>?thread_id=xxx&token=YOUR_TOKEN</code>
    </div>
  </div>

  <header>
    <h1>Meridian <span id="thread-label" class="thread-badge">...</span></h1>
    <div class="toolbar-actions">
      <button id="btn-reboot" class="btn-action">Reboot</button>
      <button id="btn-detach" class="btn-action">Detach</button>
      <button id="btn-kill" class="btn-action danger">Kill</button>
    </div>
  </header>

  <div id="main">
    <div id="loading-overlay">
      <div class="spinner"></div>
    </div>
    
    <div id="terminal-container">
      <div id="term"></div>
    </div>

    <div id="input-zone">
      <div class="hints-row">
        <button class="hint-btn" data-cmd="ls -la">ls -la</button>
        <button class="hint-btn" data-cmd="pwd">pwd</button>
        <button class="hint-btn" data-cmd="git status">git status</button>
        <button class="hint-btn" data-cmd="npm start">npm start</button>
        <button class="hint-btn" data-cmd="npm run test">npm run test</button>
        <button class="hint-btn" data-cmd="cat package.json">cat package.json</button>
        <button class="hint-btn" data-cmd="ps aux">ps aux</button>
        <button class="hint-btn" data-cmd="df -h">df -h</button>
      </div>
      <div class="input-row">
        <div class="textarea-wrapper">
          <textarea id="input-run" rows="1" placeholder="Type a command..."></textarea>
        </div>
        <button id="btn-send" class="btn-send" aria-label="Send">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    /* Meridian Web GUI — shared logic (inlined) */
    (function () {
      "use strict";
      var STORAGE_KEY = "meridian_web_token";
      function getQueryParams() {
        var params = {};
        var search = typeof window.location.search === "string" ? window.location.search.slice(1) : "";
        search.split("&").forEach(function (pair) {
          var i = pair.indexOf("=");
          if (i > 0) params[decodeURIComponent(pair.slice(0, i))] = decodeURIComponent(pair.slice(i + 1));
        });
        return params;
      }
      function getToken() {
        var q = getQueryParams();
        if (q.token) return q.token.trim();
        try { var t = sessionStorage.getItem(STORAGE_KEY); return t ? t.trim() : ""; } catch (e) { return ""; }
      }
      function setToken(token) {
        try { if (token) sessionStorage.setItem(STORAGE_KEY, token); else sessionStorage.removeItem(STORAGE_KEY); } catch (e) {}
      }
      (function () { var q = getQueryParams(); if (q.token) setToken(q.token.trim()); })();
      function apiBase() {
        var origin = window.location.origin || "";
        var p = (window.location.pathname || "/").replace(/\/[^/]*$/, "") || "/";
        if (p === "/" && origin) return origin;
        return origin + (p.endsWith("/") ? p.slice(0, -1) : p);
      }
      function fetchWithAuth(url, options) {
        options = options || {};
        var headers = options.headers || {};
        if (typeof headers.append === "function" || Array.isArray(headers)) headers = {};
        var token = getToken();
        if (token) headers["Authorization"] = "Bearer " + token;
        var u = url.indexOf("/") === 0 ? apiBase() + url : url;
        return fetch(u, Object.assign({}, options, { headers: headers }));
      }
      function ensureToken() { return !!getToken(); }
      window.MeridianWeb = { getToken: getToken, setToken: setToken, apiBase: apiBase, fetchWithAuth: fetchWithAuth, ensureToken: ensureToken, getQueryParams: getQueryParams };
    })();
  </script>
  <script>
    /* Lightweight xterm loader with timeout fallback */
    (function () {
      function boot() { document.dispatchEvent(new Event("meridian:ready")); }
      function loadXtermCDN(cb) {
        var js = document.createElement("script");
        js.src = "https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js";
        js.onload = function () {
          var fit = document.createElement("script");
          fit.src = "https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/addons/fit/fit.js";
          fit.onload = cb;
          fit.onerror = cb;
          document.body.appendChild(fit);
        };
        js.onerror = cb;
        document.body.appendChild(js);
      }
      var loaded = false;
      loadXtermCDN(function () { loaded = true; boot(); });
      setTimeout(function () { if (!loaded) { loaded = true; boot(); } }, 3000);
    })();
  </script>
  <script>
    document.addEventListener("meridian:ready", function () {
    (function () {
      var MAX_HISTORY_LINES = 10000;
      var threadId = (window.MeridianWeb.getQueryParams().thread_id || "").trim();
      var noTokenOverlay = document.getElementById("no-token-overlay");
      var loadingOverlay = document.getElementById("loading-overlay");
      var threadLabel = document.getElementById("thread-label");
      var inputRun = document.getElementById("input-run");
      var btnSend = document.getElementById("btn-send");
      var btnKill = document.getElementById("btn-kill");
      var btnReboot = document.getElementById("btn-reboot");
      var btnDetach = document.getElementById("btn-detach");
      var termEl = document.getElementById("term");

      var term = null;
      var historyBuffer = [];
      var notAvailable = false;

      // Auto-expand textarea
      inputRun.addEventListener("input", function() {
        this.style.height = "auto";
        this.style.height = (this.scrollHeight) + "px";
      });

      function appendToTerminal(chunk) {
        if (notAvailable) return;
        if (term) {
          term.write(chunk);
        }
        historyBuffer.push(chunk);
        var lines = (historyBuffer.join("").match(/\n/g) || []).length;
        if (lines > MAX_HISTORY_LINES) {
          var remove = lines - MAX_HISTORY_LINES;
          var idx = 0;
          var count = 0;
          for (var i = 0; i < historyBuffer.length; i++) {
            var n = (historyBuffer[i].match(/\n/g) || []).length;
            count += n;
            if (count >= remove) {
              idx = i + 1;
              break;
            }
          }
          historyBuffer = historyBuffer.slice(idx);
        }
      }

      function runCommand(cmd) {
        if (!window.MeridianWeb.ensureToken() || !threadId) return;
        var body = JSON.stringify({ thread_id: threadId, content: cmd });
        window.MeridianWeb.fetchWithAuth("/api/run", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: body
        }).then(function (res) {
          return res.json().then(function (data) {
            if (!res.ok) appendToTerminal("\r\nError: " + (data.error || res.status) + "\r\n");
          });
        }).catch(function (e) {
          appendToTerminal("\r\nError: " + (e && e.message ? e.message : "network") + "\r\n");
        });
      }

      function threadAction(intent) {
        if (!window.MeridianWeb.ensureToken() || !threadId) return;
        if (!confirm("Are you sure you want to " + intent + " this thread?")) return;
        
        window.MeridianWeb.fetchWithAuth("/api/" + intent, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ thread_id: threadId })
        }).then(function (res) {
          return res.json().then(function (data) {
            if (intent === "kill" || intent === "detach") {
              window.location.href = window.MeridianWeb.apiBase() + "/index.html?token=" + encodeURIComponent(window.MeridianWeb.getToken());
            }
          });
        });
      }

      if (!threadId || !window.MeridianWeb.ensureToken()) {
        noTokenOverlay.classList.remove("hidden");
      } else {
        threadLabel.textContent = threadId;
        var base = window.MeridianWeb.apiBase();
        var protocol = base.indexOf("https") === 0 ? "wss" : "ws";
        var wsBase = (protocol === "wss" ? base.replace(/^https/, "wss") : base.replace(/^http/, "ws"));
        var token = window.MeridianWeb.getToken();
        var wsUrl = wsBase.replace(/\/$/, "") + "/ws/terminal?thread_id=" + encodeURIComponent(threadId) + (token ? "&token=" + encodeURIComponent(token) : "");

        if (typeof window.Terminal === "function") {
          term = new window.Terminal({
            cursorBlink: true,
            scrollback: MAX_HISTORY_LINES,
            theme: { background: "#000000", foreground: "#e2e8f0" },
            fontSize: 14,
            fontFamily: '"SF Mono", "Fira Code", monospace'
          });
          if (window.TerminalFit) window.TerminalFit.fit(term);
          term.open(termEl);
          term.onData(function (data) {
            // Forward raw data if needed, but here we usually use the runCommand for input-run
            // However, some might want to type directly in terminal
            // For mobile, typing in terminal is hard, so we use the input zone
          });
        } else {
          termEl.style.cssText = "padding:1rem;font-family:monospace;font-size:0.875rem;white-space:pre-wrap;overflow:auto;height:100%;color:#e2e8f0;";
          var origAppend = appendToTerminal;
          appendToTerminal = function (chunk) {
            origAppend(chunk);
            termEl.textContent += chunk;
            termEl.scrollTop = termEl.scrollHeight;
          };
        }

        var ws = new WebSocket(wsUrl);
        ws.onopen = function () {
          loadingOverlay.classList.add("hidden");
        };
        ws.onmessage = function (ev) {
          try {
            var msg = JSON.parse(ev.data);
            if (msg.type === "not_available") {
              notAvailable = true;
              appendToTerminal("\r\n[Terminal not available in bridge mode]\r\n");
              return;
            }
            if (msg.type === "pane_output" && msg.chunk != null) {
              appendToTerminal(msg.chunk);
            }
          } catch (e) {}
        };
        ws.onerror = function () {
          loadingOverlay.innerHTML = "<div style='color:var(--error-color)'>WebSocket error.</div>";
        };
        ws.onclose = function () {
          if (!notAvailable) {
            loadingOverlay.classList.remove("hidden");
            loadingOverlay.innerHTML = "<div>Connection closed.</div>";
          }
        };

        function handleSend() {
          var cmd = (inputRun.value || "").trim();
          if (cmd) {
            runCommand(cmd);
            inputRun.value = "";
            inputRun.style.height = "auto";
          }
        }

        btnSend.addEventListener("click", handleSend);
        inputRun.addEventListener("keydown", function (e) {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            handleSend();
          }
        });

        document.querySelectorAll(".hint-btn").forEach(function(btn) {
          btn.addEventListener("click", function() {
            var cmd = this.getAttribute("data-cmd");
            inputRun.value = cmd;
            inputRun.style.height = "auto";
            inputRun.style.height = (inputRun.scrollHeight) + "px";
            inputRun.focus();
          });
        });

        btnKill.addEventListener("click", function () { threadAction("kill"); });
        btnReboot.addEventListener("click", function () { threadAction("reboot"); });
        btnDetach.addEventListener("click", function () { threadAction("detach"); });

        window.addEventListener("resize", function () {
          if (window.TerminalFit && term) window.TerminalFit.fit(term);
        });
        
        // Initial fit
        setTimeout(function() {
          if (window.TerminalFit && term) window.TerminalFit.fit(term);
        }, 100);
      }
    })();
    });
  </script>
</body>
</html>
