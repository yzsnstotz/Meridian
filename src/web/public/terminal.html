      function handleSend() {
        var cmd = cmdInput.value.trim();
        if (!cmd) return;
        if (!threadId) {
          addChatBubble("Error: No session. Open this page from the hub (click a session card).", "agent");
          return;
        }
        if (!window.MeridianWeb.getToken()) {
          addChatBubble("Error: Missing token. Open this page from the hub with ?token= in the URL.", "agent");
          return;
        }
        // Reset chat buffer for new turn — ensures 1:1 ask-to-reply
        chatBuffer = "";
        clearTimeout(chatTimer);
        clearTimeout(chatTypingTimer);
        showChatTyping(false);
        lastFocusSummarySent = "";
        lastRunResultAtMs = 0;
        runPending = true;

        addChatBubble(cmd, "user");
        lastSubmittedInput = cmd;
        lastSubmittedTraceId = "";
        showChatTyping(true, "Awaiting agent reply...");
        runCommand(cmd)
          .then(function(data) {
            runPending = false;
            showChatTyping(false);
            var resultContent = data && typeof data.content === "string" ? data.content.trim() : "";
            if (data && typeof data.trace_id === "string") {
              lastSubmittedTraceId = data.trace_id.toLowerCase();
            }
            if (!resultContent) return;
            // Anchor delta computation to the structured run result so pane stream won't replay older turns in chat bubbles.
            lastFlushedContent = stripAnsi(resultContent);
            lastRunResultAtMs = Date.now();
            renderAgentContent(resultContent);
            refreshSessionList();
            // After rendering, flush any pane output that accumulated during the run
            if (chatBuffer.trim()) flushChatBuffer();
          })
          .catch(function(err) {
            runPending = false;
            showChatTyping(false);
            var msg = err && err.message ? err.message : "Send failed.";
            if (err && err.status === 401) msg = "Unauthorized. Refresh the page from the hub so the URL includes ?token=.";
            addChatBubble("Error: " + msg, "agent");
            if (navigator.vibrate) navigator.vibrate(50);
        });
        cmdInput.value = "";
        cmdInput.style.height = "auto";
        cmdInput.focus();
        if (navigator.vibrate) navigator.vibrate(5);
      }
      btnSend.addEventListener("click", function(e) { e.preventDefault(); handleSend(); });
      cmdInput.addEventListener("keydown", function(e) {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSend(); }
      });

      // View Switching
      function switchView(viewName) {
        document.querySelectorAll(".view").forEach(function(v) { v.classList.add("hidden"); });
        var target = document.getElementById(viewName + "-view");
        if (target) target.classList.remove("hidden");
        document.querySelectorAll(".tab, .nav-item[data-view]").forEach(function(t) {
          t.classList.toggle("active", t.getAttribute("data-view") === viewName);
        });
        if (viewName === "terminal") {
          setTimeout(function() { fitTerminal(); cmdInput.focus(); }, 10);
        }
        if (viewName === "chat" && chatMessagesEl) {
          setTimeout(function() { chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight; cmdInput.focus(); }, 10);
        }
        closeSidebar();
      }

      document.querySelectorAll("[data-view]").forEach(el => {
        el.addEventListener("click", function(e) { e.preventDefault(); e.stopPropagation(); switchView(this.getAttribute("data-view")); });
      });

      // Sidebar logic
      function toggleSidebar() {
        var isOpen = sidebar.classList.toggle("open");
        sidebarOverlay.classList.toggle("open", isOpen);
      }
      function closeSidebar() {
        sidebar.classList.remove("open");
        sidebarOverlay.classList.remove("open");
      }
      document.getElementById("menu-toggle").addEventListener("click", function(e) { e.preventDefault(); e.stopPropagation(); toggleSidebar(); });
      document.getElementById("mobile-explorer-btn").addEventListener("click", function(e) { e.preventDefault(); e.stopPropagation(); toggleSidebar(); });
      sidebarOverlay.addEventListener("click", closeSidebar);

      // File Explorer Logic
      function compareTreeNodes(a, b) {
        if (a.kind !== b.kind) return a.kind === "dir" ? -1 : 1;
        return a.name.localeCompare(b.name);
      }

      function loadExpandedDirs() {
        try {
          var raw = sessionStorage.getItem(EXPANDED_DIRS_STORAGE_KEY);
          if (!raw) return;
          var parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) return;
          expandedDirs = new Set(
            parsed.filter(function(item) {
              return typeof item === "string" && item.trim();
            })
          );
        } catch (e) {}
      }

      function saveExpandedDirs() {
        try {
          var snapshot = Array.from(expandedDirs.values()).sort();
          sessionStorage.setItem(EXPANDED_DIRS_STORAGE_KEY, JSON.stringify(snapshot));
        } catch (e) {}
      }

      function toggleExpandedDir(dirPath) {
        if (expandedDirs.has(dirPath)) expandedDirs.delete(dirPath);
        else expandedDirs.add(dirPath);
        saveExpandedDirs();
        renderFileTree(fileTreeEntries);
      }

      function ensureTreeDirNode(root, dirPath) {
        var cleaned = (dirPath || "").replace(/^\/+|\/+$/g, "");
        if (!cleaned) return root;
        var segments = cleaned.split("/");
        var cursor = root;
        var builtPath = "";
        for (var i = 0; i < segments.length; i++) {
          var segment = segments[i];
          builtPath = builtPath ? builtPath + "/" + segment : segment;
          var child = cursor.childrenMap[builtPath];
          if (!child) {
            child = {
              name: segment,
              path: builtPath,
              kind: "dir",
              children: [],
              childrenMap: {}
            };
            cursor.children.push(child);
            cursor.childrenMap[builtPath] = child;
          }
          cursor = child;
        }
        return cursor;
      }

      function buildTreeModel(entries) {
        var root = {
          name: "",
          path: "",
          kind: "dir",
          children: [],
          childrenMap: {}
        };
        entries.forEach(function(entry) {
          if (!entry || typeof entry.path !== "string" || (entry.kind !== "file" && entry.kind !== "dir")) return;
          var cleanPath = entry.path.replace(/^\/+|\/+$/g, "");
          if (!cleanPath) return;
          var parts = cleanPath.split("/");
          var parentPath = parts.slice(0, -1).join("/");
          var baseName = parts[parts.length - 1];
          var parent = ensureTreeDirNode(root, parentPath);
          if (entry.kind === "dir") {
            ensureTreeDirNode(root, cleanPath);
            return;
          }
          parent.children.push({
            name: baseName,
            path: cleanPath,
            kind: "file",
            children: []
          });
        });

        function sortChildren(node) {
          node.children.sort(compareTreeNodes);
          node.children.forEach(function(child) {
            if (child.kind === "dir") sortChildren(child);
          });
        }
        sortChildren(root);
        return root;
      }

      function createTreeIcon(kind) {
        var wrap = document.createElement("span");
        wrap.innerHTML =
          kind === "dir"
            ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>'
            : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path><polyline points="13 2 13 9 20 9"></polyline></svg>';
        var icon = wrap.firstChild;
        icon.style.width = "16px";
        icon.style.height = "16px";
        icon.style.flexShrink = "0";
        return icon;
      }

      function renderTreeNode(node, depth) {
        var nodeWrap = document.createElement("div");
        nodeWrap.className = "tree-node";

        var row = document.createElement("div");
        row.className = "tree-row";
        row.style.paddingLeft = (0.5 + depth * 0.85) + "rem";
        if (node.path === selectedFilePath) row.classList.add("active");

        if (node.kind === "dir") {
          var toggle = document.createElement("button");
          toggle.type = "button";
          toggle.className = "tree-toggle";
          var expanded = expandedDirs.has(node.path);
          toggle.setAttribute("aria-expanded", expanded ? "true" : "false");
          toggle.setAttribute("aria-label", expanded ? "Collapse directory" : "Expand directory");
          toggle.innerHTML = expanded
            ? '<svg viewBox="0 0 20 20" fill="currentColor"><path d="M5 7l5 6 5-6H5z"></path></svg>'
            : '<svg viewBox="0 0 20 20" fill="currentColor"><path d="M7 5l6 5-6 5V5z"></path></svg>';
          toggle.addEventListener("click", function(e) {
            e.preventDefault();
            e.stopPropagation();
            toggleExpandedDir(node.path);
          });
          row.appendChild(toggle);
        } else {
          var spacer = document.createElement("span");
          spacer.className = "tree-toggle-placeholder";
          row.appendChild(spacer);
        }

        row.appendChild(createTreeIcon(node.kind));
        var label = document.createElement("span");
        label.className = "tree-label";
        label.textContent = node.name;
        row.appendChild(label);

        if (node.kind === "dir") {
          row.setAttribute("role", "button");
          row.setAttribute("tabindex", "0");
          row.setAttribute("aria-expanded", expandedDirs.has(node.path) ? "true" : "false");
          row.addEventListener("click", function() {
            toggleExpandedDir(node.path);
          });
          row.addEventListener("keydown", function(event) {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              toggleExpandedDir(node.path);
            }
          });
        } else {
          row.addEventListener("click", function() {
            openFile(node.path);
          });
        }

        nodeWrap.appendChild(row);

        if (node.kind === "dir" && node.children && node.children.length > 0) {
          var childrenWrap = document.createElement("div");
          childrenWrap.className = "tree-children";
          if (expandedDirs.has(node.path)) childrenWrap.classList.add("open");
          node.children.forEach(function(child) {
            childrenWrap.appendChild(renderTreeNode(child, depth + 1));
          });
          nodeWrap.appendChild(childrenWrap);
        }

        return nodeWrap;
      }

      function renderFileTree(entries) {
        fileTree.innerHTML = "";
        if (!entries || entries.length === 0) {
          fileTree.innerHTML = '<div class="tree-item" style="opacity: 0.6;">No files found.</div>';
          return;
        }
        var model = buildTreeModel(entries);
        var fragment = document.createDocumentFragment();
        model.children.forEach(function(child) {
          fragment.appendChild(renderTreeNode(child, 0));
        });
        fileTree.appendChild(fragment);
      }

      function refreshFiles() {
        fileTree.innerHTML = '<div class="tree-item" style="opacity: 0.5;">Loading files...</div>';
        if (!threadId) {
          fileTree.innerHTML = '<div class="tree-item" style="opacity: 0.7;">Open from hub to load files.</div>';
          return;
        }
        window.MeridianWeb
          .fetchWithAuth("/api/files?thread_id=" + encodeURIComponent(threadId))
          .then(function(res) {
            return res.json().then(function(data) {
              if (!res.ok) {
                throw new Error(data && data.error ? data.error : "Failed to list files");
              }
              return Array.isArray(data) ? data : [];
            });
          })
          .then(function(entries) {
            fileTreeEntries = entries;
            renderFileTree(fileTreeEntries);
          })
          .catch(function() {
            fileTree.innerHTML = '<div class="tree-item" style="opacity: 0.7;">Failed to load files.</div>';
          });
      }
      document.getElementById("refresh-files").addEventListener("click", refreshFiles);
      loadExpandedDirs();
      refreshFiles();
      refreshSessionList();
      refreshModelCatalog();

      function openFile(path) {
        selectedFilePath = path;
        renderFileTree(fileTreeEntries);
        loadingOverlay.classList.remove("hidden");
        switchView("editor");
        window.MeridianWeb
          .fetchWithAuth("/api/file?thread_id=" + encodeURIComponent(threadId || "") + "&path=" + encodeURIComponent(path))
          .then(function(res) {
            return res.json().then(function(data) {
              if (!res.ok) {
                throw new Error(data && data.error ? data.error : "Failed to read file");
              }
              return data;
            });
          })
          .then(function(data) {
            editorContent.value = data.content || "";
            editorContent.readOnly = false;
            currentFilename.textContent = path;
            btnSave.classList.remove("hidden");
            loadingOverlay.classList.add("hidden");
          })
          .catch(function() {
            loadingOverlay.classList.add("hidden");
            alert("Failed to read file");
          });
      }

      btnSave.addEventListener("click", function() {
        var filePath = currentFilename.textContent;
        if (!filePath || filePath === "No file open") return;
        var content = editorContent.value;
        loadingOverlay.classList.remove("hidden");
        window.MeridianWeb
          .fetchWithAuth("/api/file", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              thread_id: threadId,
              path: filePath,
              content: content
            })
          })
          .then(function(res) {
            return res.json().then(function(data) {
              if (!res.ok) {
                throw new Error(data && data.error ? data.error : "Save failed");
              }
            });
          })
          .then(function() {
            loadingOverlay.classList.add("hidden");
            alert("Saved successfully");
          })
          .catch(function() {
            loadingOverlay.classList.add("hidden");
            alert("Save failed");
          });
      });

      // Actions
      document.getElementById("btn-reboot").addEventListener("click", function() {
        if (confirm("Reboot this agent?")) {
          window.MeridianWeb.fetchWithAuth("/api/reboot", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ thread_id: threadId })
          }).then(() => alert("Reboot sent"));
        }
      });
      document.getElementById("btn-kill").addEventListener("click", function() {
        if (confirm("Kill this agent?")) {
          window.MeridianWeb.fetchWithAuth("/api/kill", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ thread_id: threadId })
          }).then(() => location.href = "index.html");
        }
      });

      // Overflow menu (mobile)
      var overflowBtn = document.getElementById("overflow-menu-btn");
      var overflowDropdown = document.getElementById("overflow-dropdown");
      function closeOverflow() {
        if (overflowDropdown) overflowDropdown.classList.remove("open");
        if (overflowBtn) overflowBtn.setAttribute("aria-expanded", "false");
      }
      function openOverflow() {
        if (overflowDropdown) overflowDropdown.classList.add("open");
        if (overflowBtn) overflowBtn.setAttribute("aria-expanded", "true");
      }
      if (overflowBtn) {
        overflowBtn.addEventListener("click", function(e) {
          e.preventDefault();
          e.stopPropagation();
          var isOpen = overflowDropdown && overflowDropdown.classList.toggle("open");
          overflowBtn.setAttribute("aria-expanded", isOpen ? "true" : "false");
        });
      }
      document.addEventListener("click", function(e) {
        if (overflowDropdown && overflowDropdown.classList.contains("open") && overflowBtn && !overflowBtn.contains(e.target) && !overflowDropdown.contains(e.target)) closeOverflow();
      });
      if (overflowDropdown) overflowDropdown.addEventListener("click", function(e) { e.stopPropagation(); });
      document.getElementById("overflow-reboot").addEventListener("click", function(e) {
        e.preventDefault();
        closeOverflow();
        if (confirm("Reboot this agent?")) {
          window.MeridianWeb.fetchWithAuth("/api/reboot", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ thread_id: threadId })
          }).then(() => alert("Reboot sent"));
        }
      });
      document.getElementById("overflow-kill").addEventListener("click", function(e) {
        e.preventDefault();
        closeOverflow();
        if (confirm("Kill this agent?")) {
          window.MeridianWeb.fetchWithAuth("/api/kill", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ thread_id: threadId })
          }).then(() => location.href = "index.html");
        }
      });
      document.getElementById("overflow-clear-chat").addEventListener("click", function(e) {
        e.preventDefault();
        closeOverflow();
        localStorage.removeItem(CHAT_HISTORY_STORAGE_KEY);
        if (chatMessagesEl) {
          chatMessagesEl.innerHTML = "";
          chatMessagesEl.classList.add("chat-messages-empty");
        }
        bubbleElementsByKey = Object.create(null);
        lastFlushedContent = "";
        lastFlushedDetails = "";
        seenBubbleFingerprintAtMs = Object.create(null);
        suppressibleMessageState = Object.create(null);
        chatBuffer = "";
      });

      // Overflow menu mirrors for mobile: Focus, Push, Filters
      var overflowFocusBtn = document.getElementById("overflow-focus");
      var overflowPushBtn = document.getElementById("overflow-push");
      var overflowFiltersBtn = document.getElementById("overflow-filters");

      function syncOverflowFocus() {
        if (!overflowFocusBtn) return;
        overflowFocusBtn.textContent = focusModeEnabled ? "Focus ON" : "Focus OFF";
        overflowFocusBtn.classList.toggle("active", focusModeEnabled);
      }
      function syncOverflowPush() {
        if (!overflowPushBtn) return;
        overflowPushBtn.textContent = pushEnabled ? "Push ON" : "Push OFF";
        overflowPushBtn.classList.toggle("active", pushEnabled);
      }
      syncOverflowFocus();
      syncOverflowPush();

      if (overflowFocusBtn) {
        overflowFocusBtn.addEventListener("click", function(e) {
          e.preventDefault();
          closeOverflow();
          if (focusToggleBtn) focusToggleBtn.click();
          syncOverflowFocus();
        });
      }
      if (overflowPushBtn) {
        overflowPushBtn.addEventListener("click", function(e) {
          e.preventDefault();
          closeOverflow();
          if (pushToggleBtn) pushToggleBtn.click();
          setTimeout(syncOverflowPush, 300);
        });
      }
      if (overflowFiltersBtn) {
        overflowFiltersBtn.addEventListener("click", function(e) {
          e.preventDefault();
          closeOverflow();
          if (filtersToggleBtn) filtersToggleBtn.click();
        });
      }

      var resizeTimeout;
      window.addEventListener("resize", function() {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(function() {
          fitTerminal();
          // If resized to desktop while on chat view, switch to terminal
          var currentView = document.querySelector(".view:not(.hidden)");
          if (!isMobile() && currentView && currentView.id === "chat-view") {
            switchView("terminal");
          }
        }, 100);
      });

      document.getElementById("thread-label").textContent = threadId || "No session";

      // Mobile: default to chat view
      if (isMobile()) {
        switchView("chat");
      }
      cmdInput.focus();
    });
  </script>
</body>
</html>
