<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Meridian — Coding Agent</title>
  <link rel="stylesheet" href="layout-base.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <style>
    :root {
      --bg-color: #0b0f1a;
      --sidebar-color: #111827;
      --surface-color: #161b2a;
      --surface-hover: #1f2638;
      --border-color: #2d3343;
      --text-color: #f0f2f5;
      --text-dim: #94a3b8;
      --accent-color: #3b82f6;
      --accent-hover: #2563eb;
      --success-color: #10b981;
      --warning-color: #f59e0b;
      --error-color: #ef4444;
      --sidebar-width: 300px;
      --safe-area-inset-top: env(safe-area-inset-top, 0px);
      --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .hidden { display: none !important; }

    header {
      flex-shrink: 0;
      background: var(--sidebar-color);
      border-bottom: 1px solid var(--border-color);
      padding: calc(0.5rem + var(--safe-area-inset-top)) 1rem 0.5rem;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
      z-index: 100;
      flex-wrap: wrap;
    }

    .header-left { display: flex; align-items: flex-start; gap: 0.5rem; min-width: 0; flex: 1 1 auto; overflow: visible; }
    .header-title-block { display: flex; flex-direction: column; gap: 0.125rem; min-width: 0; flex: 1 1 auto; }
    .header-repo { max-width: 100%; }
    .header-repo-name { font-size: 0.8125rem; font-weight: 600; color: var(--text-color); line-height: 1.25; word-break: break-word; }
    .header-repo-path { font-size: 0.65rem; color: var(--text-dim); font-family: "SF Mono", "Fira Code", ui-monospace, monospace; line-height: 1.35; word-break: break-all; }
    .header-right { display: flex; align-items: center; gap: 0.5rem; flex: 0 1 auto; min-width: 0; }
    .focus-toggle {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-dim);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .focus-toggle.active {
      color: var(--accent-color);
      border-color: var(--accent-color);
      background: rgba(59, 130, 246, 0.12);
    }
    .back-btn { background: transparent; border: none; color: var(--text-dim); cursor: pointer; padding: 0.5rem; display: flex; border-radius: 0.375rem; touch-action: manipulation; min-width: 44px; min-height: 44px; align-items: center; justify-content: center; }
    .back-btn:hover { color: #fff; background: var(--surface-hover); }
    
    header h1 {
      font-size: 0.9375rem;
      font-weight: 600;
      display: block;
      min-width: 0;
      flex: 1 1 auto;
      line-height: 1.6;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .thread-badge {
      background: var(--bg-color);
      color: var(--accent-color);
      padding: 0.125rem 0.375rem;
      border-radius: 0.375rem;
      font-family: monospace;
      font-size: 0.75rem;
      border: 1px solid var(--border-color);
      display: inline-block;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      vertical-align: middle;
      white-space: nowrap;
    }


    #workspace {
      flex: 1;
      display: flex;
      min-height: 0;
      position: relative;
    }

    /* Sidebar / File Explorer */
    #sidebar {
      width: var(--sidebar-width);
      background: var(--sidebar-color);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 200;
      min-width: 0;
    }

    .sidebar-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 150;
      display: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      cursor: pointer;
      touch-action: manipulation;
    }
    .sidebar-overlay.open { display: block; opacity: 1; }

    .sidebar-tabbar {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.375rem;
      padding: 0.75rem;
      border-bottom: 1px solid var(--border-color);
    }
    .sidebar-tabbtn {
      border: 1px solid var(--border-color);
      background: transparent;
      color: var(--text-dim);
      border-radius: 0.625rem;
      padding: 0.55rem 0.75rem;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .sidebar-tabbtn.active {
      background: var(--surface-color);
      color: var(--text-color);
      border-color: rgba(59, 130, 246, 0.45);
      box-shadow: inset 0 -2px 0 var(--accent-color);
    }
    .sidebar-panel {
      flex: 1;
      min-height: 0;
      display: none;
      flex-direction: column;
    }
    .sidebar-panel.active {
      display: flex;
    }
    .sidebar-header {
      padding: 0.75rem 1rem;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-dim);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #file-tree {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
    }
    #session-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
    }
    .session-item {
      border: 1px solid var(--border-color);
      background: rgba(11, 15, 26, 0.45);
      border-radius: 0.875rem;
      padding: 0.75rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      text-align: left;
      color: var(--text-color);
    }
    .session-item.active {
      border-color: rgba(59, 130, 246, 0.55);
      background: rgba(59, 130, 246, 0.12);
    }
    .session-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      font-size: 0.6875rem;
      color: var(--text-dim);
    }
    .session-title {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.75rem;
      color: var(--accent-color);
      word-break: break-all;
    }
    .session-preview {
      font-size: 0.8125rem;
      line-height: 1.45;
      color: var(--text-dim);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .session-status {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.2rem 0.45rem;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      font-size: 0.625rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .session-status.live {
      color: var(--success-color);
      border-color: rgba(16, 185, 129, 0.35);
      background: rgba(16, 185, 129, 0.08);
    }

    .tree-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem;
      border-radius: 0.375rem;
      font-size: 0.875rem;
      cursor: pointer;
      color: var(--text-dim);
      word-break: break-all;
      white-space: normal;
      margin-bottom: 2px;
    }

    .tree-item:hover { background: var(--surface-color); color: #fff; }
    .tree-item:active { background: var(--surface-hover); }
    .tree-item.active { background: rgba(59, 130, 246, 0.1); color: var(--accent-color); }
    .tree-item svg { flex-shrink: 0; width: 16px; height: 16px; }
    .tree-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 0.5rem;
      border-radius: 0.375rem;
      font-size: 0.875rem;
      color: var(--text-dim);
      cursor: pointer;
      user-select: none;
    }
    .tree-row:hover { background: var(--surface-color); color: #fff; }
    .tree-row.active { background: rgba(59, 130, 246, 0.1); color: var(--accent-color); }
    .tree-toggle {
      width: 16px;
      height: 16px;
      border: none;
      background: transparent;
      color: inherit;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .tree-toggle:hover { background: rgba(148, 163, 184, 0.16); }
    .tree-toggle-placeholder {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }
    .tree-label {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
      flex: 1;
    }
    .tree-node {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .tree-children {
      margin-left: 0.25rem;
      padding-left: 0.35rem;
      border-left: 1px dashed rgba(148, 163, 184, 0.25);
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: max-height 0.18s ease, opacity 0.18s ease;
    }
    .tree-children.open {
      max-height: 1200px;
      opacity: 1;
    }

    /* Main Area */
    #main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(18, 24, 38, 0.92) 0%, rgba(7, 10, 16, 0.98) 100%);
      position: relative;
    }

    .tabs {
      height: 40px;
      background: var(--sidebar-color);
      display: flex;
      border-bottom: 1px solid var(--border-color);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      padding: 0 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8125rem;
      color: var(--text-dim);
      border-right: 1px solid var(--border-color);
      cursor: pointer;
      word-break: break-all;
      white-space: normal;
      background: var(--sidebar-color);
      transition: all 0.2s;
    }

    .tab:hover { color: #fff; }
    .tab.active { background: var(--bg-color); color: #fff; box-shadow: inset 0 -2px 0 var(--accent-color); }

    .view-container {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    /* Editor View */
    #editor-view {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    #editor-content {
      flex: 1;
      background: transparent;
      color: var(--text-color);
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 13px;
      padding: 1rem;
      border: none;
      resize: none;
      outline: none;
      line-height: 1.6;
      -webkit-overflow-scrolling: touch;
    }

    /* Terminal View */
    #terminal-view {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #05070b;
      min-height: 0;
    }
    #term-container {
      flex: 1;
      min-height: 0;
      padding: 0.5rem 0.625rem 0.75rem;
      border-top: 1px solid rgba(148, 163, 184, 0.08);
      background:
        radial-gradient(circle at top, rgba(59, 130, 246, 0.08), transparent 28%),
        #05070b;
    }

    /* Input Zone */
    #input-zone {
      flex-shrink: 0;
      background: var(--surface-color);
      border-top: 1px solid var(--border-color);
      padding: 0.75rem;
      padding-bottom: calc(0.75rem + var(--safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      z-index: 100;
    }

    .input-row { display: flex; gap: 0.5rem; align-items: flex-end; }
    .header-select {
      min-width: 180px;
      max-width: 220px;
      background: rgba(11, 15, 26, 0.9);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      border-radius: 0.625rem;
      padding: 0.45rem 0.65rem;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .textarea-wrapper {
      flex: 1;
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 1rem;
      padding: 0.5rem 0.875rem;
      display: flex;
      align-items: center;
    }
    textarea#cmd-input {
      width: 100%;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 0.9375rem;
      resize: none;
      outline: none;
      max-height: 120px;
      padding: 0;
      line-height: 1.4;
    }

    .btn-send {
      background: var(--accent-color);
      color: white;
      border: none;
      border-radius: 50%;
      width: 2.75rem;
      height: 2.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.2s, background 0.2s;
    }
    .btn-send:hover { background: var(--accent-hover); }
    .btn-send:active { transform: scale(0.95); }
    .btn-send { touch-action: manipulation; min-width: 44px; min-height: 44px; }

    /* Mobile Styles */
    @media (max-width: 768px) {
      header {
        padding: calc(0.5rem + var(--safe-area-inset-top)) 0.75rem 0.5rem;
        align-items: stretch;
      }
      .header-left {
        width: 100%;
        flex-wrap: nowrap;
      }
      .header-right {
        width: 100%;
        justify-content: flex-end;
      }
      .header-right > .header-select {
        order: 1;
      }
      .header-right > #agent-status {
        order: 2;
      }
      .header-right > .header-overflow {
        order: 3;
        margin-left: 0.25rem;
      }
      .header-select {
        min-width: 0;
        max-width: none;
        flex: 1 1 auto;
      }
      #agent-status {
        margin-left: 0 !important;
        flex-shrink: 0;
        white-space: nowrap;
      }
      #sidebar {
        position: absolute;
        left: 0; top: 0; bottom: 0;
        width: min(var(--sidebar-width), calc(100vw - 2.5rem));
        max-width: calc(100vw - 2.5rem);
        transform: translateX(-100%);
        box-shadow: 10px 0 30px rgba(0,0,0,0.5);
      }
      #sidebar.open { transform: translateX(0); }
      
      .header-right .btn-action { display: none; } /* Hide complex actions in header on mobile */
      
      .mobile-nav {
        display: flex;
        background: var(--sidebar-color);
        border-top: 1px solid var(--border-color);
        padding-bottom: var(--safe-area-inset-bottom);
      }
      .nav-item {
        flex: 1;
        padding: 0.75rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.25rem;
        font-size: 0.625rem;
        color: var(--text-dim);
        cursor: pointer;
        touch-action: manipulation;
        min-height: 44px;
        justify-content: center;
      }
      .nav-item.active { color: var(--accent-color); }
      .nav-item svg { width: 22px; height: 22px; }
      
      #main-content .tabs { display: none; } /* Use bottom nav instead */
    }
    @media (max-width: 480px) {
      #agent-status { display: none !important; }
    }

    /* Header overflow menu (mobile: Reboot/Kill in dropdown) */
    .header-overflow {
      display: none;
      position: relative;
    }
    .header-overflow .overflow-trigger {
      background: transparent;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      padding: 0.5rem;
      border-radius: 0.375rem;
      touch-action: manipulation;
      min-width: 44px;
      min-height: 44px;
      align-items: center;
      justify-content: center;
      display: flex;
    }
    .header-overflow .overflow-trigger:hover { color: #fff; background: var(--surface-hover); }
    .header-overflow .overflow-dropdown {
      position: absolute;
      top: 100%;
      right: 0;
      left: auto;
      margin-top: 0.25rem;
      background: var(--surface-color);
      border: 1px solid var(--border-color);
      border-radius: 0.5rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      min-width: 140px;
      max-width: min(16rem, calc(100vw - 1rem));
      z-index: 1000;
      display: none;
    }
    .header-overflow .overflow-dropdown.open { display: block; }
    .header-overflow .overflow-dropdown button {
      display: block;
      width: 100%;
      padding: 0.75rem 1rem;
      border: none;
      background: none;
      color: var(--text-color);
      font-size: 0.875rem;
      text-align: left;
      cursor: pointer;
      touch-action: manipulation;
    }
    .header-overflow .overflow-dropdown button:hover { background: var(--surface-hover); }
    .header-overflow .overflow-dropdown button.kill { color: var(--error-color); }
    .header-overflow .overflow-dropdown .overflow-divider {
      height: 1px;
      background: var(--border-color);
      margin: 0.25rem 0;
    }
    .header-overflow .overflow-dropdown button.active {
      color: var(--accent-color);
    }
    .header-overflow .overflow-dropdown .overflow-trace-copy {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.2rem;
      text-align: left;
      font-weight: 500;
    }
    .header-overflow .overflow-dropdown .overflow-trace-copy:disabled {
      cursor: default;
      opacity: 0.65;
    }
    .header-overflow .overflow-dropdown .overflow-trace-copy:not(:disabled) {
      cursor: pointer;
    }
    .header-overflow .overflow-dropdown .overflow-trace-copy:not(:disabled):hover {
      background: var(--surface-hover);
    }
    .overflow-trace-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-dim); }
    .overflow-trace-value { font-family: "SF Mono", "Fira Code", ui-monospace, monospace; font-size: 0.68rem; line-height: 1.3; word-break: break-all; color: #e2e8f0; max-width: 100%; }
    .overflow-trace-hint { font-size: 0.62rem; color: var(--text-dim); }
    @media (max-width: 768px) {
      .header-overflow { display: flex; align-items: center; }
      .header-right .btn-action { display: none; }
      .header-right > .focus-toggle,
      .header-right > select.focus-toggle { display: none; }
    }

    @media (min-width: 769px) {
      .mobile-nav { display: none; }
      #menu-toggle { display: none; }
      .header-overflow { display: none; }
      .header-right .btn-action { display: flex; }
      #workspace {
        display: grid;
        grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
      }
      .tabs {
        height: 36px;
        background: rgba(11, 15, 26, 0.88);
      }
      .tab {
        border-right-color: rgba(148, 163, 184, 0.12);
      }
      #input-zone {
        background: rgba(11, 15, 26, 0.9);
      }
    }

    .spinner-overlay {
      position: absolute;
      inset: 0;
      background: rgba(11, 15, 26, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
    }
    .spinner { width: 2.5rem; height: 2.5rem; border: 3px solid var(--border-color); border-top-color: var(--accent-color); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Chat View (mobile agent interaction) ── */
    #chat-view {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-color);
      min-height: 0;
      overflow: hidden;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
      -webkit-overflow-scrolling: touch;
      min-height: 0;
    }
    .chat-messages-empty::after {
      content: "Agent output will appear here. Send a message below or wait for pane output.";
      display: block;
      padding: 1rem;
      color: var(--text-dim);
      font-size: 0.8125rem;
      line-height: 1.5;
    }
    .chat-bubble {
      max-width: 92%;
      padding: 0.625rem 0.875rem;
      border-radius: 1rem;
      background: var(--surface-color);
      border: 1px solid var(--border-color);
      word-break: break-word;
      animation: chatFadeIn 0.15s ease;
      position: relative;
    }
    .bubble-copy-toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      padding: 0.5rem 1.25rem;
      border-radius: 0.75rem;
      font-size: 0.8125rem;
      z-index: 9999;
      pointer-events: none;
      animation: toastFade 1.2s ease forwards;
    }
    @keyframes toastFade {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
      15% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      70% { opacity: 1; }
      100% { opacity: 0; }
    }
    .chat-bubble.user {
      align-self: flex-end;
      background: var(--accent-color);
      border-color: var(--accent-hover);
      color: white;
      border-bottom-right-radius: 0.25rem;
      max-width: 80%;
    }
    .chat-bubble.agent {
      align-self: flex-start;
      border-bottom-left-radius: 0.25rem;
    }
    .chat-bubble-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      opacity: 0.7;
      margin-bottom: 0.35rem;
      gap: 0.5rem;
    }
    .chat-bubble-caller { font-weight: 600; }
    .chat-bubble-time { font-variant-numeric: tabular-nums; }
    .chat-text {
      white-space: pre-wrap;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.8125rem;
      line-height: 1.5;
    }

    .chat-yn-btn.yes:active { background: rgba(16, 185, 129, 0.15); }
    .chat-yn-btn.no { border-color: var(--error-color); color: var(--error-color); }

  <script>
    /* Lightweight xterm loader */
    (function () {
      function boot() { document.dispatchEvent(new Event("meridian:ready")); }
      function loadXterm(cb) {
        var done = false;
        function finish() {
          if (done) return;
          done = true;
          cb();
        }
        var js = document.createElement("script");
        js.src = "https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js";
        js.onerror = finish;
        js.onload = function () {
          var fit = document.createElement("script");
          fit.src = "https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js";
          fit.onload = finish;
          fit.onerror = finish;
          document.body.appendChild(fit);
        };
        document.body.appendChild(js);
        // Fallback: do not block the entire UI on CDN issues.
        setTimeout(finish, 3000);
      }
      loadXterm(boot);
    })();
  </script>

      var chatTypingEl = document.getElementById("chat-typing");

      var chatTypingTimer = null;

        window.MeridianWeb && typeof window.MeridianWeb.getFocusModeEnabled === "function"
          ? window.MeridianWeb.getFocusModeEnabled(true)

      var CHAT_FLUSH_WINDOW_MS = 1200;

      var CHAT_COLLAPSE_CHAR_LIMIT = 400;
      var SUMMARY_MARKER_BEGIN = "[[MERIDIAN_SUMMARY_BEGIN";
      var SUMMARY_MARKER_END = "[[MERIDIAN_SUMMARY_END";
      var SUMMARY_BLOCK_TIMEOUT_MS = 6000;
      var SUMMARY_INCOMPLETE_LABEL = "summary incomplete";
      var CHAT_HISTORY_STORAGE_KEY = "meridian_chat_history:" + (threadId || "active");
      var CHAT_HISTORY_MAX_ITEMS = 200;
      // Restore limit: how many entries we keep in localStorage between
      // page reloads. Bumped from 60 → 1000 so closing/reopening a tab
      // does not throw away the conversation tail an operator was reading.
      var CHAT_HISTORY_RESTORE_LIMIT = 1000;
      // Bootstrap limit: how many entries we ask the Hub for on page open.
      // Bumped from 60 → 2000 (Hub-side cap is 5000 per
      // src/hub/router.ts:THREAD_HISTORY_LIMIT) so long-running bridge
      // threads no longer show up as "the chat starts from when I opened
      // the page" — the full recorded transcript renders on first load.
      var CHAT_HISTORY_BOOTSTRAP_LIMIT = 2000;
      var CHAT_HISTORY_MAX_CONTENT_CHARS = -1;
      var CHAT_HISTORY_MAX_DETAIL_CHARS = -1;
      var CHAT_HISTORY_MAX_RAW_CHARS = -1;
      var CHAT_HISTORY_TRUNCATION_LABEL = "[History truncated]";
      var fallbackSummaryText = "Update received. Expand details for full output.";
      var suppressibleMessageState = Object.create(null);
      var seenBubbleFingerprintAtMs = Object.create(null);
      var chatHistoryHydrating = false;
      // R-06: trace_id → caller resolution map. Populated from history
      // user_send/terminal_input entries on /api/history load and from local

      function readStoredModelEffort() {
        try {
          return normalizeModelEffort(localStorage.getItem(MODEL_EFFORT_STORAGE_KEY));
        } catch (e) {}
        return "";
      }

      function saveStoredModelEffort(effort) {
        try {
          var normalizedEffort = normalizeModelEffort(effort);
          if (!normalizedEffort) {
            localStorage.removeItem(MODEL_EFFORT_STORAGE_KEY);
            return;
          }
          localStorage.setItem(MODEL_EFFORT_STORAGE_KEY, normalizedEffort);
        } catch (e) {}
      }

      function syncModelEffortControl(value) {
        if (!modelEffortSelectEl) return;
        modelEffortSelectEl.value = normalizeModelEffort(value);
      }

      function isMobile() { return window.innerWidth <= 768; }

      function normalizeModelEffort(value) {
        var effort = value == null ? "" : String(value).trim().toLowerCase();
        return effort === "low" || effort === "medium" || effort === "high" || effort === "xhigh"
          ? effort
          : "";
      }

      function parseModelReferenceWithEffort(rawModelId, explicitEffort) {
        var modelId = rawModelId == null ? "" : String(rawModelId).trim();
        var normalizedEffort = normalizeModelEffort(explicitEffort);
        if (!modelId) {
          return {
            modelId: "",
            reasoningEffort: normalizedEffort
          };
        }
        var separatorIndex = modelId.indexOf("::");
        if (separatorIndex > -1) {
          var modelPart = modelId.slice(0, separatorIndex).trim();
          if (modelPart) {
            return {
              modelId: modelPart,
              reasoningEffort: normalizedEffort || normalizeModelEffort(modelId.slice(separatorIndex + 2))
            };
          }
        }
        var lastSpaceIndex = modelId.lastIndexOf(" ");
        if (lastSpaceIndex > -1) {
          var possibleEffort = modelId.slice(lastSpaceIndex + 1).toLowerCase().trim();
          if (possibleEffort === "low" || possibleEffort === "medium" || possibleEffort === "high" || possibleEffort === "xhigh") {
            return {
              modelId: modelId.slice(0, lastSpaceIndex).trim(),
              reasoningEffort: normalizedEffort || possibleEffort
            };
          }
        }
        return {
          modelId: modelId,
          reasoningEffort: normalizedEffort
        };
      }

      function requestModelSwitch() {
        if (!modelSelectEl) return;
        var selectedId = modelSelectEl.value;
        var selectedEffort = modelEffortSelectEl && modelEffortSelectEl.value;
        var normalizedEffort = normalizeModelEffort(selectedEffort);
        var currentModelId = modelCatalogState && modelCatalogState.current_model_id ? modelCatalogState.current_model_id : "";

        if (selectedId === CUSTOM_MODEL_OPTION_VALUE) {
          var manualId = window.prompt("Enter provider model id:", currentModelId || "");
          if (!manualId || !manualId.trim()) {
            refreshModelCatalog(currentModelId);
            return;
          }
          selectedId = manualId.trim();
        }

        if (!selectedId) {
          return;
        }

        var parsedModel = parseModelReferenceWithEffort(selectedId, selectedEffort);
        if (!parsedModel.modelId) {
          addChatBubble("Model switch failed: invalid model id", "agent", "", { timestamp: new Date().toISOString() });
          refreshModelCatalog(currentModelId || "");
          return;
        }

        if (selectedId === currentModelId && normalizedEffort === currentModelEffort) {
          return;
        }

        modelSelectEl.disabled = true;
        window.MeridianWeb.fetchWithAuth("/api/models", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            thread_id: threadId,
            model_id: parsedModel.modelId,
            ...(parsedModel.reasoningEffort ? { effort: parsedModel.reasoningEffort } : {})
          })
        })
          .then(function(res) {
            return res.json().then(function(data) {
              if (!res.ok) {
                throw new Error(data && data.error ? data.error : "Failed to switch model");
              }
              return data;
            });
          })
          .then(function() {
            addChatBubble("Model switch requested: " + parsedModel.modelId, "agent", "", { timestamp: new Date().toISOString() });
            currentModelEffort = normalizeModelEffort(parsedModel.reasoningEffort);
            saveStoredModelEffort(currentModelEffort);
            syncModelEffortControl(currentModelEffort);
            return new Promise(function(resolve) { setTimeout(resolve, 1200); });
          })
          .then(function() {
            return refreshModelCatalog(parsedModel.modelId);
          })
          .catch(function(err) {
            addChatBubble("Model switch failed: " + (err && err.message ? err.message : "unknown error"), "agent", "", { timestamp: new Date().toISOString() });
            refreshModelCatalog(currentModelId || "");
          });
      }

      function stripAnsi(str) {
        return str.replace(/\x1b\[[0-9;]*[a-zA-Z]/g, "")
                  .replace(/\x1b\][^\x07]*\x07/g, "")
                  .replace(/\x1b[()][AB012]/g, "")
                  .replace(/\r/g, "");
      }

      function detectOptions(text) {
        if (!/(^|\n)\s*(Choose|Select)\s*:/i.test(text)) return [];
        var lines = text.split("\n").filter(function(l) { return l.trim(); });
        var opts = [];
        var re1 = /^\s*(\d+)[.)]\s+(.+)$/;
        var re2 = /^\s*\[(\d+)\]\s+(.+)$/;
        for (var i = 0; i < lines.length; i++) {
          var m = lines[i].match(re1) || lines[i].match(re2);
          if (m) opts.push({ key: m[1], label: m[2].trim() });
        }
        return opts.length >= 2 ? opts : [];
      }

      function detectYesNo(text) {
        return /(^|\n)\s*(Answer with|Please answer)\s+(y\/n|yes\/no)\b/i.test(text);
      }

      function normalizeApprovalText(text) {
        var stripped = stripAnsi(text || "").replace(/\r/g, "");
        var lines = stripped.split(/\n/).map(function(rawLine) {
          var trimmed = rawLine.replace(/\s+$/, "");
          var compact = trimmed.trim();
          if (!compact) return "";
          if (/^[\s╭╮╰╯─━═▀▄▁▔█]+$/.test(compact)) return "";
          var boxed = compact.match(/^[│┃]\s?(.*?)\s?[│┃]$/);
          if (boxed) return (boxed[1] || "").replace(/\s+$/, "");
          return compact;
        });
        while (lines.length && !lines[0]) lines.shift();
        while (lines.length && !lines[lines.length - 1]) lines.pop();
        return lines.join("\n").trim();
      }

      function normalizeApprovalOptionLabel(label) {
        return (label || "")
          .trim()
          .replace(/\s*\(esc\)\s*$/i, "")
          .replace(/\s*\([ypn]\)\s*$/i, "")
          .trim();
      }

      function stripApprovalPromptLeader(text) {
        return (text || "").replace(/^\?\s*/, "").trim();
      }

      function isApprovalOptionLine(text) {
        return /^[●○›•]?\s*\d+\.\s+/.test((text || "").trim());
      }

      function isDiffPreviewLine(text) {
        return /^\d+\s+[+\-]?\S/.test((text || "").trim());
      }

      function mapApprovalOptionAction(label) {
        var lower = normalizeApprovalOptionLabel(label).toLowerCase().replace(/[\s_-]+/g, "");
        if (!lower) return null;
        if (
          lower.indexOf("allowonce") >= 0 ||
          lower.indexOf("runonce") >= 0 ||
          lower.indexOf("approveonce") >= 0 ||
          lower.indexOf("yesproceed") >= 0 ||
          lower === "yes"
        ) return "run";
        if (
          lower.indexOf("allowforthissession") >= 0 ||
          lower.indexOf("forthissession") >= 0 ||
          lower.indexOf("allowlist") >= 0 ||
          lower.indexOf("dontaskagain") >= 0
        ) return "allow";
        if (
          lower.indexOf("allowforall") >= 0 ||
          lower.indexOf("allowall") >= 0 ||
          lower.indexOf("alwaysallow") >= 0 ||
          lower.indexOf("allcommands") >= 0
        ) return "all";
        if (
          lower === "no" ||
          lower.indexOf("deny") >= 0 ||
          lower.indexOf("suggestchanges") >= 0 ||
          lower.indexOf("reject") >= 0 ||
          lower.indexOf("dontallow") >= 0 ||
          lower.indexOf("tellcodexwhattododifferently") >= 0 ||
          lower.indexOf("tellmewhattododifferently") >= 0
        ) return "skip";
        return null;
      }

      function parseApprovalOptionsFromText(text) {
        var normalized = normalizeApprovalText(text);
        var lines = normalized.split(/\r?\n/).map(function(l) { return l.trim(); }).filter(Boolean);
        var options = [];
        var seenNums = {};
        for (var i = 0; i < lines.length; i++) {
          var m = lines[i].match(/^[●○›•]?\s*(\d+)\.\s*(.+)$/);
          if (!m) continue;
          var num = parseInt(m[1], 10);
          var key = String(num);
          var label = normalizeApprovalOptionLabel(m[2]);
          if (seenNums[num]) continue;
          seenNums[num] = true;
          var action = mapApprovalOptionAction(label);
          options.push({ key: key, label: key + ". " + label, action: action, submit: key });
        }
        return options;
      }

      function findNearestApprovalContextLine(lines, fromIndex) {
        for (var index = fromIndex - 1; index >= 0; index--) {
          var candidate = stripApprovalPromptLeader(lines[index] || "");
          var lower = candidate.toLowerCase();
          if (!candidate) continue;
          if (lower === "action required" || isApprovalOptionLine(candidate) || isDiffPreviewLine(candidate)) continue;
          return candidate;
        }
        return "";
      }

      function findNearestEditApprovalContextLine(lines, fromIndex) {
        for (var index = fromIndex - 1; index >= 0; index--) {
          var candidate = stripApprovalPromptLeader(lines[index] || "");
          if (!candidate) continue;
          if (/^(edit|write|update|create|delete|rename|move)\b/i.test(candidate)) return candidate;
        }
        return findNearestApprovalContextLine(lines, fromIndex);
      }

      function buildApprovalSummaryLines(header, context, promptLine, options) {
        var summary = ["Waiting for approval...", header];
        var normalizedContext = (context || "").trim();
        var normalizedPromptLine = (promptLine || "").trim();
        if (normalizedContext && normalizedContext !== header && normalizedContext !== normalizedPromptLine) {
          summary.push(normalizedContext);
        }
        if (normalizedPromptLine && normalizedPromptLine !== header) {
          summary.push(normalizedPromptLine);
        }
        options.forEach(function(opt) { summary.push(opt.label); });
        return summary.join("\n");
      }

      function summarizeApprovalPrompt(content) {
        var normalized = normalizeApprovalText(content);
        if (!normalized) return "";
        var lower = normalized.toLowerCase();
        if (
          lower.indexOf("waiting for approval") >= 0 &&
          (lower.indexOf("run this command?") >= 0 || lower.indexOf("allowlist") >= 0 || lower.indexOf("apply this change?") >= 0)
        ) {
          return normalized;
        }

        var lines = normalized
          .split(/\r?\n/)
          .map(function(line) { return line.trim(); })
          .filter(Boolean);
        var options = parseApprovalOptionsFromText(normalized);
        if (options.length === 0) return "";

        if (lower.indexOf("action required") >= 0 && lower.indexOf("allow execution of:") >= 0) {
          var allowIndex = -1;
          for (var allowScan = 0; allowScan < lines.length; allowScan++) {
            if (/^allow execution of:/i.test(lines[allowScan])) {
              allowIndex = allowScan;
              break;
            }
          }
          if (allowIndex < 0) return "";
          return buildApprovalSummaryLines(
            "Run this command?",
            findNearestApprovalContextLine(lines, allowIndex),
            lines[allowIndex] || "Allow execution?",
            options
          );
        }

        if (lower.indexOf("action required") >= 0 && lower.indexOf("apply this change?") >= 0) {
          var applyIndex = -1;
          for (var applyScan = 0; applyScan < lines.length; applyScan++) {
            if (/^apply this change\?$/i.test(lines[applyScan])) {
              applyIndex = applyScan;
              break;
            }
          }
          if (applyIndex < 0) return "";
          return buildApprovalSummaryLines(
            "Apply this change?",
            findNearestEditApprovalContextLine(lines, applyIndex),
            lines[applyIndex] || "Apply this change?",
            options
          );
        }

        if (/would you like to run the following command\?/i.test(lower)) {
          var codexCommand = "";
          for (var lineIndex = 0; lineIndex < lines.length; lineIndex++) {
            var commandMatch = lines[lineIndex].match(/^\$\s*(.+)$/);
            if (commandMatch) {
              codexCommand = commandMatch[1] || "";
              break;
            }
          }
          return buildApprovalSummaryLines("Run this command?", codexCommand, "Run this command?", options);
        }

        if (lower.indexOf("action required") >= 0) {
          for (var questionIndex = 0; questionIndex < lines.length; questionIndex++) {
            var questionLine = stripApprovalPromptLeader(lines[questionIndex] || "");
            if (!questionLine || isApprovalOptionLine(questionLine) || questionLine.toLowerCase() === "action required") continue;
            if (!/\?$/.test(questionLine)) continue;
            return buildApprovalSummaryLines(
              questionLine || "Approval required",
              findNearestApprovalContextLine(lines, questionIndex),
              questionLine,
              options
            );
          }
        }

        return "";
      }

      function detectApprovalPrompt(text) {
        return !!summarizeApprovalPrompt(text);
      }

      function extractApprovalSelectionToken(label) {
        var trimmed = (label || "").trim();
        if (!trimmed) return "";
        if (/^\d+$/.test(trimmed)) return trimmed;
        var optionMatch = trimmed.match(/^(\d+)\.\s+/);
        if (optionMatch) return optionMatch[1] || "";
        return mapApprovalOptionAction(trimmed) || "";
      }

      function buildTraceMessageKey(type, traceId) {
        var normalizedType = type === "user" ? "user" : "agent";
        var normalizedTraceId = typeof traceId === "string" ? traceId.trim().toLowerCase() : "";
        return normalizedTraceId ? normalizedType + ":trace:" + normalizedTraceId : "";
      }

      function buildHistoryMessageKey(entry) {
        if (!entry) return "";
        if (typeof entry.id === "string" && entry.id.trim()) {
          return "history:" + entry.id.trim();
        }
        return buildTraceMessageKey(entry.type, entry.trace_id);
      }

      function buildProgressMessageKey(traceId) {
        var normalizedTraceId = typeof traceId === "string" ? traceId.trim().toLowerCase() : "";
        return "progress:" + (normalizedTraceId || threadId || "active");
      }

      function traceIdFromMessageKey(key) {
        if (!key || typeof key !== "string") return "";
        var m = key.match(/:trace:([0-9a-fA-F-]{36})/);
        return m && m[1] ? m[1].toLowerCase() : "";
      }

      function recordLatestTraceId(raw) {
        if (raw == null || typeof raw !== "string") return;
        var t = raw.trim();
        if (!t) return;
        latestKnownTraceId = t.toLowerCase();
        syncOverflowTraceRow();
      }

      // R-06: register the originating caller for a trace_id so subsequent
      // agent bubbles sharing that trace_id can render the same caller label.
      function rememberCallerForTrace(traceId, caller) {
        if (typeof traceId !== "string") return;
        var key = traceId.trim().toLowerCase();
        if (!key) return;
        if (!caller || typeof caller !== "object") return;
        var callerId = typeof caller.caller_id === "string" ? caller.caller_id : "";
        if (!callerId) return;
        var label = typeof caller.caller_label === "string" && caller.caller_label
          ? caller.caller_label
          : callerId;
        traceCallerById[key] = { caller_id: callerId, caller_label: label };
      }

      function lookupCallerForTrace(traceId) {
        if (typeof traceId !== "string") return null;
        var key = traceId.trim().toLowerCase();
        if (!key) return null;
        return traceCallerById[key] || null;
      }

      // R-06: derive a caller object from a history entry's nullable
      // caller_id / caller_label fields. Returns null when no caller_id.
      function callerFromHistoryEntry(entry) {
        if (!entry || typeof entry !== "object") return null;
        var callerId = typeof entry.caller_id === "string" ? entry.caller_id : "";
        if (!callerId) return null;
        var label = typeof entry.caller_label === "string" && entry.caller_label
          ? entry.caller_label
          : callerId;
        return { caller_id: callerId, caller_label: label };
      }

      var META_TIME_FORMATTER = (function() {
        try {
          return new Intl.DateTimeFormat(undefined, {
            month: "short",
            day: "numeric",
            hour: "2-digit",
            minute: "2-digit",
            hour12: false
          });
        } catch (e) {
          return null;
        }
      })();

      // R-06: format an ISO timestamp into a short local-time label
      // ("MMM D, HH:MM"). Returns "" for missing/invalid input so the meta
      // strip can hide the time span gracefully rather than rendering "Invalid".
      function formatBubbleTimePretty(isoTs) {
        if (typeof isoTs !== "string" || !isoTs) return "";
        var ms = Date.parse(isoTs);
        if (isNaN(ms)) return "";
        var d = new Date(ms);
        if (META_TIME_FORMATTER) {
          var parts = META_TIME_FORMATTER.formatToParts(d);
          var month = "", day = "", hour = "", minute = "";
          for (var i = 0; i < parts.length; i++) {
            var p = parts[i];
            if (p.type === "month") month = p.value;
            else if (p.type === "day") day = p.value;
            else if (p.type === "hour") hour = p.value;
            else if (p.type === "minute") minute = p.value;
          }
          if (month && day && hour && minute) {
            return month + " " + day + ", " + hour + ":" + minute;
          }
        }
        // Fallback: manual format
        var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        var pad = function(n) { return n < 10 ? "0" + n : "" + n; };
        return months[d.getMonth()] + " " + d.getDate() + ", " + pad(d.getHours()) + ":" + pad(d.getMinutes());
      }

      function syncOverflowTraceRow() {
        var valEl = document.getElementById("overflow-trace-value");
        var btn = document.getElementById("overflow-copy-trace");
        if (!valEl || !btn) return;
        if (!latestKnownTraceId) {
          valEl.textContent = "—";
          btn.disabled = true;
          return;
        }
        valEl.textContent = latestKnownTraceId;
        btn.disabled = false;
      }

      function buildA2AWorkingMessageKey(taskId) {
        return "a2a:working:" + (taskId || threadId || "active");
      }

      function normalizeTaskId(taskId) {
        return typeof taskId === "string" ? taskId.trim().toLowerCase() : "";
      }

      function getOrCreateA2ATaskState(taskId) {
        var normalizedTaskId = normalizeTaskId(taskId);
        var state = a2aTaskStates.get(normalizedTaskId);
        if (!state) {
          state = {
            taskId: normalizedTaskId,
            taskState: "working",
            workingText: "",
            dataDetails: []
          };
          a2aTaskStates.set(normalizedTaskId, state);
        }
        return state;
      }

      function hasActiveA2AStream() {
        var iterator = a2aTaskStates.values();
        for (var next = iterator.next(); !next.done; next = iterator.next()) {
          if (next.value && next.value.taskState === "working") {
            return true;
          }
        }
        return false;
      }

      function serializeA2AData(value) {
        if (value === undefined) return "";
        if (typeof value === "string") return value;
        try {
          return JSON.stringify(value, null, 2);
        } catch (e) {
          return String(value);
        }
      }

      function collectA2APayload(parts) {
        var payload = {
          text: "",
          dataText: ""
        };
        if (!Array.isArray(parts)) return payload;
        var dataParts = [];
        for (var i = 0; i < parts.length; i++) {
          var part = parts[i];
          if (!part || typeof part !== "object") continue;
          if (part.type === "text" && typeof part.text === "string") {
            payload.text += part.text;
          } else if (part.type === "data") {
            var serialized = serializeA2AData(part.data);
            if (serialized) dataParts.push(serialized);
          }
        }
        payload.dataText = dataParts.join("\n\n");
        return payload;
      }

      function rememberA2AOutputElement(taskId, messageKey) {
        var normalizedTaskId = normalizeTaskId(taskId);
        if (!normalizedTaskId || !messageKey) return;
        var bubble = bubbleElementsByKey[messageKey];
        if (bubble) {
          a2aTaskOutputElements.set(normalizedTaskId, bubble);
        }
      }

      // Batch high-frequency working deltas into one render per frame.
      function scheduleA2ARender(taskId) {
        var normalizedTaskId = normalizeTaskId(taskId);
        if (!normalizedTaskId) return;
        pendingA2ARenderTaskIds.add(normalizedTaskId);
        if (a2aRenderFrame) return;
        a2aRenderFrame = requestAnimationFrame(function() {
          a2aRenderFrame = 0;
          var taskIds = Array.from(pendingA2ARenderTaskIds.values());
          pendingA2ARenderTaskIds.clear();
          for (var i = 0; i < taskIds.length; i++) {
            var currentTaskId = taskIds[i];
            var state = a2aTaskStates.get(currentTaskId);
            if (!state || state.taskState !== "working") continue;
            var content = stripAnsi(state.workingText || "").trim();
            var details = state.dataDetails.join("\n\n").trim();
            if (!content) {
              content = details ? "Update received." : "";
            }
            if (!content) continue;
            var messageKey = buildA2AWorkingMessageKey(currentTaskId);
            addChatBubble(content, "agent", details, {
              messageKey: messageKey,
              dedupe: false,
              persist: false,
              timestamp: new Date().toISOString(),
              traceId: currentTaskId
            });
            rememberA2AOutputElement(currentTaskId, messageKey);
          }
          if (hasActiveA2AStream()) {
            showChatTyping(true, "Agent is responding...");
          }
        });
      }

      function finalizeA2ATask(taskId, taskState, parts) {
        var normalizedTaskId = normalizeTaskId(taskId);
        if (!normalizedTaskId) return;

        var state = a2aTaskStates.get(normalizedTaskId) || getOrCreateA2ATaskState(normalizedTaskId);
        state.taskState = taskState;
        var payload = collectA2APayload(parts);
        var finalText = stripMeridianNoise(stripAnsi(payload.text || "")).trim();
        var workingText = stripMeridianNoise(stripAnsi(state.workingText || "")).trim();
        var dataDetails = payload.dataText.trim();
        var lowValueDataDetails = dataDetails && isUsageStatsPayload(dataDetails);
        var finalContent = finalText || workingText || dataDetails;
        if (!finalContent) {
          finalContent = taskState === "failed" ? "Error: Agent run failed." : "Completed.";
        }
        if (taskState === "failed" && finalContent.indexOf("Error:") !== 0) {
          finalContent = "Error: " + finalContent;
        }

        var detailsBlocks = [];
        if (taskState === "failed" && workingText && workingText !== finalContent) {
          detailsBlocks.push("Working output:\n" + workingText);
        }
        if (dataDetails && dataDetails !== finalContent && !lowValueDataDetails) {
          detailsBlocks.push("Structured payload:\n" + dataDetails);
        }
        var details = detailsBlocks.join("\n\n").trim();
        var workingMessageKey = buildA2AWorkingMessageKey(normalizedTaskId);
        clearBubbleByKey(workingMessageKey);
        a2aTaskOutputElements.delete(normalizedTaskId);
        pendingA2ARenderTaskIds.delete(normalizedTaskId);
        addChatBubble(finalContent, "agent", details, {
          messageKey: buildTraceMessageKey("agent", normalizedTaskId),
          dedupe: false,
          timestamp: new Date().toISOString(),
          traceId: normalizedTaskId
        });
        rememberA2AOutputElement(normalizedTaskId, buildTraceMessageKey("agent", normalizedTaskId));
