          for (var i = 0; i < renderEntries.length; i++) {
            var entry = normalizeHistoryEntry(renderEntries[i]);
            if (!entry) continue;
            var entryCaller = callerFromHistoryEntry(entry);
            var entryTraceId = typeof entry.trace_id === "string" ? entry.trace_id : "";
            addChatBubble(entry.content || "", entry.type || "agent", entry.details_text || "", {
              persist: false,
              dedupe: false,
              messageKey: buildHistoryMessageKey(entry),
              caller: entryCaller,
              timestamp: typeof entry.timestamp === "string" ? entry.timestamp : "",
              traceId: entryTraceId
            });
          }
        } finally {
          chatHistoryHydrating = false;
        }
        cacheServerHistory(renderEntries);
        serverHistoryAuthoritative = !latestPendingEntry;
        if (latestPendingEntry) {
          activeProgressMessageKey = buildHistoryMessageKey(latestPendingEntry);
          activeProgressTraceId = latestPendingEntry.trace_id || "";
        } else {
          activeProgressMessageKey = "";
          activeProgressTraceId = "";
        }
        for (var hi = 0; hi < entries.length; hi++) {
          var te = entries[hi];
          if (te && te.trace_id) recordLatestTraceId(te.trace_id);
        }
        return true;
      }

      function findLatestPendingHistoryEntry(entries) {
        if (!Array.isArray(entries) || entries.length === 0) return null;
        var latestPendingEntry = null;
        for (var i = 0; i < entries.length; i++) {
          var entry = entries[i];
          if (!entry) continue;
          if (isPendingHistoryEntry(entry)) {
            latestPendingEntry = entry;
          } else if (entry.event_kind === "final_reply") {
            latestPendingEntry = null;
          }
        }
        return latestPendingEntry;
      }

      function findLatestFinalHistoryEntry(entries) {
        if (!Array.isArray(entries) || entries.length === 0) return null;
        for (var i = entries.length - 1; i >= 0; i--) {
          var entry = entries[i];
          if (entry && entry.event_kind === "final_reply") {
            return entry;
          }
        }
        return null;
      }

      function shouldBootstrapLiveProgress(snapshot, historyEntries) {
        if (!snapshot || typeof snapshot.content !== "string") return false;
        var content = snapshot.content.trim();
        if (!content) return false;
        var entries = Array.isArray(historyEntries) ? historyEntries : [];
        var historyHasPending = entries.some(isPendingHistoryEntry);
        if (!historyHasPending && !detectApprovalPrompt(content) && !isProgressPlaceholderText(content)) {
          return false;
        }

        var normalizedSnapshot = stripAnsi(content).trim();
        for (var i = entries.length - 1; i >= 0; i--) {
          var entry = entries[i];
          if (!entry || typeof entry !== "object") continue;
          var entryContent = typeof entry.content === "string" ? entry.content : "";
          var entryDetails = typeof entry.details_text === "string" ? entry.details_text : "";
          var normalizedEntry = stripAnsi((entryDetails || entryContent || "")).trim();
          if (normalizedEntry === normalizedSnapshot) {
            return false;
          }
        }
        return true;
      }

      function reconcileBootstrapProgress(entries) {
        if (!threadId || !token) {
          return Promise.resolve(false);
        }
        return fetchThreadProgress()
          .then(function(snapshot) {
            if (!shouldBootstrapLiveProgress(snapshot, entries)) {
              return false;
            }
            serverHistoryAuthoritative = false;
            renderProgressSnapshot(snapshot);
            return true;
          })
          .catch(function() {
            return false;
          });
      }

      function addChatBubble(content, type, detailsText, options) {
        if (!chatMessagesEl) return;
        var opts = options || {};
        var resolvedType = type || "agent";
        var resolvedDetails = detailsText || "";
        var fingerprint = makeBubbleFingerprint(content, resolvedType, resolvedDetails);
        var contentFingerprint = makeBubbleContentFingerprint(content, resolvedType);
        var messageKey = opts.messageKey || "";
        var nowMs = Date.now();
        var existingBubble = messageKey && bubbleElementsByKey[messageKey] && bubbleElementsByKey[messageKey].parentNode
          ? bubbleElementsByKey[messageKey]
          : null;
        syncApprovalStateWithBubble(content, resolvedType, resolvedDetails);
        // Never dedupe user messages — sending the same text twice is intentional
        if (resolvedType !== "user") {
          if (existingBubble && existingBubble.getAttribute("data-fingerprint") === fingerprint) {
            return;
          }
          var seenAt = seenBubbleFingerprintAtMs[fingerprint];
          if (opts.dedupe !== false && seenAt && (nowMs - seenAt) < 120000) {
            return;
          }
          if (opts.dedupe !== false && chatMessagesEl.lastElementChild && chatMessagesEl.lastElementChild.getAttribute("data-fingerprint") === fingerprint) {
            return;
          }
          if (opts.dedupe !== false && hasRecentBubbleWithContentFingerprint(contentFingerprint, 6, existingBubble)) {
            return;
          }
          if (shouldSuppressMessage(content, resolvedType)) return;
        }
        seenBubbleFingerprintAtMs[fingerprint] = nowMs;

        if (existingBubble) {
          existingBubble.parentNode.removeChild(existingBubble);
        }

        var bubble = document.createElement("div");
        bubble.className = "chat-bubble " + resolvedType;
        bubble.setAttribute("data-fingerprint", fingerprint);
        bubble.setAttribute("data-content-fingerprint", contentFingerprint);
        if (messageKey) {
          bubble.setAttribute("data-message-key", messageKey);
          bubbleElementsByKey[messageKey] = bubble;
        }

        // R-06: meta strip (caller + timestamp). For agent bubbles whose own
        // caller is unknown, fall back to the trace_id → caller map populated
        // from the originating user_send entry.
        var metaCaller = null;
        if (opts.caller && typeof opts.caller === "object" && typeof opts.caller.caller_id === "string" && opts.caller.caller_id) {
          metaCaller = {
            caller_id: opts.caller.caller_id,
            caller_label: typeof opts.caller.caller_label === "string" && opts.caller.caller_label
              ? opts.caller.caller_label
              : opts.caller.caller_id
          };
        }
        var metaTraceId = typeof opts.traceId === "string" ? opts.traceId : "";
        if (!metaCaller && resolvedType !== "user" && metaTraceId) {
          var resolved = lookupCallerForTrace(metaTraceId);
          if (resolved) metaCaller = resolved;
        }
        if (resolvedType === "user" && metaCaller && metaTraceId) {
          rememberCallerForTrace(metaTraceId, metaCaller);
        }
        var metaIso = typeof opts.timestamp === "string" ? opts.timestamp : "";
        var metaPretty = formatBubbleTimePretty(metaIso);
        if (metaCaller || metaPretty) {
          var metaEl = document.createElement("div");
          metaEl.className = "chat-bubble-meta";
          var callerSpan = document.createElement("span");
          callerSpan.className = "chat-bubble-caller";
          if (metaCaller) {
            callerSpan.textContent = metaCaller.caller_label;
            bubble.setAttribute("data-caller-id", metaCaller.caller_id);
          } else {
            callerSpan.textContent = "";
            callerSpan.style.visibility = "hidden";
          }
          metaEl.appendChild(callerSpan);
          var timeSpan = document.createElement("span");
          timeSpan.className = "chat-bubble-time";
          if (metaPretty) {
            timeSpan.textContent = metaPretty;
            timeSpan.setAttribute("title", metaIso);
          } else {
            timeSpan.textContent = "";
            timeSpan.style.visibility = "hidden";
          }
          metaEl.appendChild(timeSpan);
          bubble.appendChild(metaEl);
        }

        // Render content with three layers of segmentation, in priority order:
        //   1. Triple-backtick fenced code blocks become standalone <pre><code>.
        //   2. Within remaining text, the existing diff/indent heuristic groups
        //      consecutive code-shaped lines into <pre><code>.
        //   3. Plain-text segments are split on blank lines so each paragraph
        //      renders as its own <div> for readable spacing.
        // Without this, agent replies arrive as one wall of text — fenced code,
        // tool output, and prose all collapsed together.
        function renderCodeBlock(blockText, lang) {
          var pre = document.createElement("pre");
          pre.className = "chat-code";
          if (lang) pre.setAttribute("data-lang", lang);
          var code = document.createElement("code");
          code.textContent = blockText;
          pre.appendChild(code);
          var copyBtn = document.createElement("button");
          copyBtn.className = "copy-btn";
          copyBtn.textContent = "Copy";
          copyBtn.addEventListener("click", (function(t) {
            return function() {
              navigator.clipboard.writeText(t).catch(function(){});
              this.textContent = "Copied!";
              var self = this;
              setTimeout(function() { self.textContent = "Copy"; }, 1500);
            };
          })(blockText));
          pre.appendChild(copyBtn);
          bubble.appendChild(pre);
        }

        function renderTextParagraphs(text) {
          // Split on runs of 2+ newlines so each paragraph gets its own div
          // and inherits .chat-text's vertical spacing.
          var paragraphs = text.split(/\n{2,}/);
          for (var p = 0; p < paragraphs.length; p++) {
            var para = paragraphs[p].replace(/^\n+|\n+$/g, "");
            if (!para.trim()) continue;
            var div = document.createElement("div");
            div.className = "chat-text";
            div.textContent = para;
            bubble.appendChild(div);
          }
        }

        function renderTextSegment(text) {
          // Apply the existing diff/indent heuristic to surface code-shaped
          // runs that are NOT inside a fenced block.
          var lines = text.split("\n");
          var currentBlock = [];
          var currentIsCode = false;
          function flushBlock() {
            if (currentBlock.length === 0) return;
            var blockText = currentBlock.join("\n");
            if (!blockText.trim()) { currentBlock = []; return; }
            if (currentIsCode) {
              renderCodeBlock(blockText, "");
            } else {
              renderTextParagraphs(blockText);
            }
            currentBlock = [];
          }
          for (var i = 0; i < lines.length; i++) {
            var line = lines[i];
            var isCodeLine = /^[+\-<>]/.test(line) || /^@@/.test(line) || /^diff /.test(line) || /^\s{4,}\S/.test(line);
            if (i === 0) {
              currentIsCode = isCodeLine;
              currentBlock.push(line);
            } else if (isCodeLine !== currentIsCode) {
              flushBlock();
              currentIsCode = isCodeLine;
              currentBlock.push(line);
            } else {
              currentBlock.push(line);
            }
          }
          flushBlock();
        }

        // Pass 1: peel off fenced code blocks (```lang\n...\n```) so they win
        // over the heuristic and keep their language hint.
        var fenceRe = /```([A-Za-z0-9_+\-.]*)\n([\s\S]*?)```/g;
        var lastIdx = 0;
        var fenceMatch;
        var sawAnyFence = false;
        while ((fenceMatch = fenceRe.exec(content)) !== null) {
          sawAnyFence = true;
          if (fenceMatch.index > lastIdx) {
            renderTextSegment(content.slice(lastIdx, fenceMatch.index));
          }
          renderCodeBlock(fenceMatch[2], fenceMatch[1] || "");
          lastIdx = fenceMatch.index + fenceMatch[0].length;
        }
        if (sawAnyFence) {
          if (lastIdx < content.length) {
            renderTextSegment(content.slice(lastIdx));
          }
        } else {
          renderTextSegment(content);
        }

        // Tap to copy entire bubble text
        (function(el, text) {
          function showToast(msg) {
            var t = document.createElement("div");
            t.className = "bubble-copy-toast";
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(function() { if (t.parentNode) t.parentNode.removeChild(t); }, 1300);
          }
          el.style.cursor = "pointer";
          el.addEventListener("click", function(e) {
            // Don't copy when clicking links, buttons, or details/summary
            if (e.target.closest("a, button, summary, details")) return;
            navigator.clipboard.writeText(text).then(function() {
              showToast("Message copied");
            }).catch(function() {
              showToast("Copy failed");
            });
          });
        })(bubble, content);

        if (resolvedType !== "user" && resolvedDetails) {
          var details = document.createElement("details");
          details.className = "chat-details";
          var summary = document.createElement("summary");
          var detailLineCount = resolvedDetails.split(/\r?\n/).length;
          summary.textContent = "Details (" + detailLineCount + " lines)";
          var detailsBody = document.createElement("div");
          detailsBody.className = "chat-details-body";
          detailsBody.textContent = resolvedDetails;
          details.appendChild(summary);
          details.appendChild(detailsBody);
          bubble.appendChild(details);
        }

        // Detect and render option buttons (strict prompt gate)
        if (resolvedType !== "user") {
          var approvalDetectionText = content + (resolvedDetails ? "\n" + resolvedDetails : "");
          if (detectApprovalPrompt(approvalDetectionText)) {
            var parsedApprovalOpts = parseApprovalOptionsFromText(approvalDetectionText);
            if (parsedApprovalOpts.length === 0) {
              // Fallback: show standard approval options
              parsedApprovalOpts = [
                { key: "1", label: "1. Allow once", action: "run", submit: "1" },
                { key: "2", label: "2. Allow for this session", action: "allow", submit: "2" },
                { key: "3", label: "3. No, suggest changes", action: "skip", submit: "3" }
              ];
            }
            var approvalDiv = document.createElement("div");
            approvalDiv.className = "chat-options";
            approvalDiv.setAttribute("data-approval-prompt", "true");
            parsedApprovalOpts.forEach(function(opt) {
              var btn = document.createElement("button");
              btn.className = "chat-option-btn";
              btn.textContent = opt.label;
              if (opt.action) btn.setAttribute("data-approval-action", opt.action);
              btn.setAttribute("data-approval-token", opt.submit || opt.key);
              btn.addEventListener("click", function() {
                var approvalToken = opt.submit || opt.key || opt.action || "";
                resolveApprovalOptions(approvalToken);
                addChatBubble(opt.label, "user", "", {
                  caller: WEB_GUI_CALLER,
                  timestamp: new Date().toISOString()
                });
                sendTerminalApproval(approvalToken).catch(function(err) {
                  var msg = err && err.message ? err.message : "Approval action failed.";
                  addChatBubble("Error: " + msg, "agent", "", { timestamp: new Date().toISOString() });
                });
                if (navigator.vibrate) navigator.vibrate(10);
              });
              approvalDiv.appendChild(btn);
            });
            bubble.appendChild(approvalDiv);
          }

          var opts = detectOptions(content);
          if (opts.length > 0) {
            var optDiv = document.createElement("div");
            optDiv.className = "chat-options";
            opts.forEach(function(opt) {
              var btn = document.createElement("button");
              btn.className = "chat-option-btn";
              btn.textContent = opt.key + ". " + opt.label;
              btn.addEventListener("click", function() {
                addChatBubble(opt.key, "user", "", {
                  caller: WEB_GUI_CALLER,
                  timestamp: new Date().toISOString()
                });
                optDiv.querySelectorAll(".chat-option-btn").forEach(function(b) { b.disabled = true; });
                btn.classList.add("selected");
                sendTerminalText(opt.key).catch(function(err) {
                  var msg = err && err.message ? err.message : "Terminal input failed.";
                  addChatBubble("Error: " + msg, "agent", "", { timestamp: new Date().toISOString() });
                });
                if (navigator.vibrate) navigator.vibrate(10);
              });
              optDiv.appendChild(btn);
            });
            bubble.appendChild(optDiv);
          }

          if (detectYesNo(content)) {
            var ynDiv = document.createElement("div");
            ynDiv.className = "chat-yn-options";
            [{key:"y",label:"Yes",cls:"yes"},{key:"n",label:"No",cls:"no"}].forEach(function(opt) {
              var btn = document.createElement("button");
              btn.className = "chat-yn-btn " + opt.cls;
              btn.textContent = opt.label;
              btn.addEventListener("click", function() {
                addChatBubble(opt.key, "user", "", {
                  caller: WEB_GUI_CALLER,
                  timestamp: new Date().toISOString()
                });
                ynDiv.querySelectorAll(".chat-yn-btn").forEach(function(b) { b.disabled = true; });
                btn.classList.add("selected");
                sendTerminalText(opt.key).catch(function(err) {
                  var msg = err && err.message ? err.message : "Terminal input failed.";
                  addChatBubble("Error: " + msg, "agent", "", { timestamp: new Date().toISOString() });
                });
                if (navigator.vibrate) navigator.vibrate(10);
              });
              ynDiv.appendChild(btn);
            });
            bubble.appendChild(ynDiv);
          }
        }

        chatMessagesEl.appendChild(bubble);
        if (chatMessagesEl.classList.contains("chat-messages-empty")) chatMessagesEl.classList.remove("chat-messages-empty");
        if (chatAutoScroll) chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
        if (opts.persist !== false) {
          appendChatHistoryEntry(content, resolvedType, resolvedDetails, messageKey, {
            caller_id: metaCaller ? metaCaller.caller_id : "",
            caller_label: metaCaller ? metaCaller.caller_label : "",
            timestamp: metaIso,
            trace_id: metaTraceId
          });
        }
      }

      function showChatTyping(show, text) {
        if (chatTypingEl) {
          chatTypingEl.classList.toggle("active", show);
          if (text) {
            var label = chatTypingEl.lastChild;
            if (label && label.nodeType === 3) label.textContent = " " + text;
          }
        }
        if (show && chatAutoScroll) chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
      }

      function stripMeridianNoise(text) {
        var lines = text.split(/\r?\n/);
        var cleaned = [];
        var prevLine = null;
        for (var i = 0; i < lines.length; i++) {
          if (isLowValueLine(lines[i])) continue;
          // Deduplicate consecutive identical lines
          var trimmed = lines[i].trim();
          if (trimmed === prevLine) continue;
          cleaned.push(lines[i]);
          prevLine = trimmed;
        }
        return cleaned.join("\n").trim();
      }

      function computeDelta(text, previous) {
        if (!previous) return text;
        // Prefix match: if current text starts with previous, take only the suffix
        if (text.indexOf(previous) === 0) {
          return text.slice(previous.length).trim();
        }
        // Suffix overlap: if previous ends with the beginning of text, trim overlap
        var overlapLen = Math.min(previous.length, text.length);
        for (var ol = overlapLen; ol > 0; ol--) {
          if (previous.slice(-ol) === text.slice(0, ol)) {
            return text.slice(ol).trim();
          }
        }
        return text;
      }

      function composeRawDetail(inputText, outputText) {
        // Filter out transient/noise lines so detail shows only agent reply content
        var cleanedOutput = stripMeridianNoise(stripSummaryProtocolTags(stripAnsi(outputText || "")));
        var cleanedInput = (inputText || "").trim();
        if (!cleanedOutput && !cleanedInput) return "";
        if (!cleanedInput) return cleanedOutput;
        return "Your message:\n" + cleanedInput + "\n\nAgent reply:\n" + cleanedOutput;
      }

      function flushChatBuffer() {
        if (!chatBuffer.trim()) { chatBuffer = ""; return; }
        // While a run is in-flight, suppress pane-stream chat — the run
        // result will be the authoritative reply for this turn.
        if (runPending || activeProgressMessageKey) {
          chatBuffer = "";
          showChatTyping(false);
          return;
        }
        // Suppress pane-stream bubbles during post-run cooldown — the run
        // result already rendered the authoritative reply for this turn.
        if (lastRunResultAtMs && (Date.now() - lastRunResultAtMs) < RUN_RESULT_COOLDOWN_MS) {
          chatBuffer = "";
          showChatTyping(false);
          return;
        }
        var text = stripAnsi(chatBuffer).trim();
        chatBuffer = "";
        if (!text) return;
        showChatTyping(false);

        // Deduplicate against previously flushed content
        var newContent = computeDelta(text, lastFlushedContent);
        lastFlushedContent = text;
        if (!newContent) return;

        if (focusModeEnabled) {
          var expectedTraceId = lastSubmittedTraceId || resolveTraceIdFromText(newContent);
          var digest = summarizeAgentText(newContent, expectedTraceId);
          var cleanSummary = stripMeridianNoise(digest.summary);
          if (!cleanSummary || cleanSummary === fallbackSummaryText) return;
          var cleanDetails = digest.details ? stripMeridianNoise(digest.details) : "";
          var latestDetails = cleanDetails ? computeDelta(cleanDetails, lastFlushedDetails) : "";
          if (cleanDetails) {
            lastFlushedDetails = cleanDetails;
          }
          var rawDetail = composeRawDetail(lastSubmittedInput, digest.rawOutput || newContent);
          var bubbleTraceId = expectedTraceId || resolveTraceIdFromText(digest.rawOutput || newContent);
          addChatBubble(cleanSummary, "agent", rawDetail, {
            messageKey: buildTraceMessageKey("agent", bubbleTraceId),
            timestamp: new Date().toISOString(),
            traceId: bubbleTraceId
          });
          lastFocusSummarySent = cleanSummary;
          lastSubmittedInput = "";
          // Only clear trace_id when a proper summary was extracted.
          if (digest.summary && digest.summary !== fallbackSummaryText && !digest.incomplete) {
            lastSubmittedTraceId = "";
          }
        } else {
          var cleanText = stripMeridianNoise(newContent);
          if (!cleanText) return;
          var nonFocusTraceId = lastSubmittedTraceId || resolveTraceIdFromText(newContent);
          addChatBubble(cleanText, "agent", "", {
            timestamp: new Date().toISOString(),
            traceId: nonFocusTraceId
          });
        }
      }

      function renderAgentContent(rawContent) {
        var text = stripAnsi(rawContent || "").trim();
        if (!text) return;
        if (focusModeEnabled) {
          var expectedTraceId = lastSubmittedTraceId || resolveTraceIdFromText(text);
          var digest = summarizeAgentText(text, expectedTraceId);
          var cleanSummary = stripMeridianNoise(digest.summary);
          if (!cleanSummary || cleanSummary === fallbackSummaryText) return;
          var rawDetail = composeRawDetail(lastSubmittedInput, digest.rawOutput || text);
          var bubbleTraceId = expectedTraceId || resolveTraceIdFromText(digest.rawOutput || text);
          addChatBubble(cleanSummary, "agent", rawDetail, {
            messageKey: buildTraceMessageKey("agent", bubbleTraceId),
            timestamp: new Date().toISOString(),
            traceId: bubbleTraceId
          });
          lastFocusSummarySent = cleanSummary;
          lastSubmittedInput = "";
          // Only clear trace_id when a proper summary was extracted;
          // keep it alive so subsequent pane output can still match.
          if (digest.summary && digest.summary !== fallbackSummaryText && !digest.incomplete) {
            lastSubmittedTraceId = "";
          }
        } else {
          var cleanText = stripMeridianNoise(stripSummaryProtocolTags(text));
          if (!cleanText) return;
          var renderTraceId = lastSubmittedTraceId || resolveTraceIdFromText(text);
          addChatBubble(cleanText, "agent", "", {
            timestamp: new Date().toISOString(),
            traceId: renderTraceId
          });
        }
      }

      if (chatMessagesEl) {
        chatMessagesEl.addEventListener("scroll", function() {
          chatAutoScroll = chatMessagesEl.scrollHeight - chatMessagesEl.scrollTop - chatMessagesEl.clientHeight < 50;
        });
      }
      if (focusToggleBtn) {
        focusToggleBtn.classList.toggle("active", focusModeEnabled);
        focusToggleBtn.textContent = focusModeEnabled ? "Focus ON" : "Focus OFF";
        focusToggleBtn.addEventListener("click", function() {
          focusModeEnabled = !focusModeEnabled;
          focusToggleBtn.classList.toggle("active", focusModeEnabled);
          focusToggleBtn.textContent = focusModeEnabled ? "Focus ON" : "Focus OFF";
          if (window.MeridianWeb && typeof window.MeridianWeb.setFocusModeEnabled === "function") {
            window.MeridianWeb.setFocusModeEnabled(focusModeEnabled);
          }
          if (typeof syncOverflowFocus === "function") syncOverflowFocus();
        });
      }

      // ── Push toggle ──
      var pushToggleBtn = document.getElementById("push-toggle");
      var pushEnabled = false;

      function updatePushButton(enabled) {
        pushEnabled = enabled;
        if (!pushToggleBtn) return;
        pushToggleBtn.classList.toggle("active", pushEnabled);
        pushToggleBtn.textContent = pushEnabled ? "Push ON" : "Push OFF";
        if (typeof syncOverflowPush === "function") syncOverflowPush();
      }

      function sendPushToggle(enabled) {
        var body = { enabled: enabled };
        if (threadId) body.thread_id = threadId;
        return window.MeridianWeb.fetchWithAuth("/api/push", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        }).then(function(r) { return r.json(); }).then(function(data) {
          if (data && data.status === "error") {
            updatePushButton(false);
            addChatBubble("Push: " + (data.content || "unknown error"), "agent", "", { timestamp: new Date().toISOString() });
          } else if (data && data.status === "success") {
            updatePushButton(enabled);
            if (data.content) addChatBubble(data.content, "agent", "", { timestamp: new Date().toISOString() });
          }
        }).catch(function(err) {
          updatePushButton(false);
          addChatBubble("Push toggle failed: " + (err && err.message ? err.message : "network error"), "agent", "", { timestamp: new Date().toISOString() });
        });
      }

      if (pushToggleBtn) {
        pushToggleBtn.addEventListener("click", function() {
          sendPushToggle(!pushEnabled);
        });
        // Query initial push state
        if (threadId) {
          window.MeridianWeb.fetchWithAuth("/api/push", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ thread_id: threadId })
          }).then(function(r) { return r.json(); }).then(function(data) {
            if (data && data.status === "success" && data.content) {
              var isOn = /\bis ON\b/i.test(data.content);
              updatePushButton(isOn);
            }
          }).catch(function() {});
        }
      }

      // ── Capture interval control ──
      var captureIntervalSelect = document.getElementById("capture-interval");
      if (captureIntervalSelect) {
        // Load current value from server
        window.MeridianWeb.fetchWithAuth("/api/capture_interval")
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (data && typeof data.interval_ms === "number") {
              captureIntervalSelect.value = String(data.interval_ms);
              // If value doesn't match any option, pick the nearest
              if (!captureIntervalSelect.querySelector("option[value='" + data.interval_ms + "']")) {
                var best = null;
                var options = captureIntervalSelect.options;
                for (var i = 0; i < options.length; i++) {
                  var v = Number(options[i].value);
                  if (!best || Math.abs(v - data.interval_ms) < Math.abs(best - data.interval_ms)) best = v;
                }
                if (best) captureIntervalSelect.value = String(best);
              }
            }
          }).catch(function() {});
        captureIntervalSelect.addEventListener("change", function() {
          var ms = Number(captureIntervalSelect.value);
          if (!ms) return;
          window.MeridianWeb.fetchWithAuth("/api/capture_interval", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ interval_ms: ms })
          }).catch(function() {});
        });
      }

      function fetchThreadHistory() {
        if (!threadId) return Promise.resolve([]);
        var query = [
          "thread_id=" + encodeURIComponent(threadId),
          "limit=" + encodeURIComponent(String(CHAT_HISTORY_BOOTSTRAP_LIMIT))
        ].join("&");
        return window.MeridianWeb.fetchWithAuth("/api/history?" + query)
          .then(function(res) {
            return res.json().then(function(data) {
              if (!res.ok) {
                throw new Error(data && data.error ? data.error : "Failed to load history");
              }
              return Array.isArray(data) ? data : [];
            });
          });
      }

      function fetchThreadProgress() {
        if (!threadId) return Promise.resolve(null);
        return window.MeridianWeb.fetchWithAuth("/api/progress/" + encodeURIComponent(threadId))
          .then(function(res) {
            return res.json().then(function(data) {
              if (!res.ok) {
                throw new Error(data && data.error ? data.error : "Failed to load progress");
              }
              return data && typeof data === "object" ? data : null;
            });
          });
      }

      function shouldPollProgress() {
        return Boolean(threadId && token && (runPending || activeProgressMessageKey));
      }

      function stopProgressPolling() {
        clearTimeout(progressPollTimer);
        progressPollTimer = null;
      }

      function scheduleProgressPoll(delayMs) {
        stopProgressPolling();
        if (!shouldPollProgress()) return;
        progressPollTimer = setTimeout(function() {
          progressPollTimer = null;
          pollThreadProgress();
        }, delayMs);
      }

      function renderProgressSnapshot(snapshot) {
        if (!snapshot) return;
        var content = typeof snapshot.display_text === "string" ? snapshot.display_text.trim() : "";
        if (!content && typeof snapshot.content === "string") {
          content = snapshot.content.trim();
        }
        if (!content) return;
        var traceId = typeof snapshot.trace_id === "string" ? snapshot.trace_id.toLowerCase() : "";
        var nextMessageKey = buildProgressMessageKey(traceId);
        if (activeProgressMessageKey && activeProgressMessageKey !== nextMessageKey) {
          clearBubbleByKey(activeProgressMessageKey);
        }
        var truncatedContent = truncateHistoryText(content, CHAT_HISTORY_MAX_CONTENT_CHARS);
        var progressDetails = truncatedContent !== content
          ? truncateHistoryText(content, CHAT_HISTORY_MAX_DETAIL_CHARS)
          : "";
        activeProgressMessageKey = nextMessageKey;
        activeProgressTraceId = traceId;
        recordLatestTraceId(traceId);
        var snapshotTimestamp = typeof snapshot.timestamp === "string" && snapshot.timestamp
          ? snapshot.timestamp
          : new Date().toISOString();
        addChatBubble(truncatedContent, "agent", progressDetails, {
          messageKey: nextMessageKey,
          timestamp: snapshotTimestamp,
          traceId: traceId
        });
        showChatTyping(false);
      }

      function pollThreadProgress() {
        if (!shouldPollProgress()) return;
        var shouldSyncHistory = Boolean(serverHistoryRestored && activeProgressMessageKey && !runPending);
        var historyPromise = shouldSyncHistory
          ? fetchThreadHistory().catch(function() {
              return null;
            })
          : Promise.resolve(null);
        var progressUnavailable = false;
        fetchThreadProgress()
          .then(function(snapshot) {
            renderProgressSnapshot(snapshot);
            return historyPromise;
          })
          .catch(function(err) {
            var message = err && err.message ? err.message : "";
            if (/no active agent session|no registered agent instance found/i.test(message)) {
              progressUnavailable = true;
            }
            return historyPromise;
          })
          .then(function(entries) {
            if (entries && maybeResolveProgressFromServerHistory(entries)) {
              progressUnavailable = true;
              return null;
            }
            if (progressUnavailable) {
              stopProgressPolling();
              clearActiveProgressBubble();
              showChatTyping(false);
            }
            return null;
          })
          .finally(function() {
            if (!progressUnavailable && shouldPollProgress()) {
              scheduleProgressPoll(PROGRESS_POLL_INTERVAL_MS);
            }
          });
      }

      function startProgressPolling(immediate) {
        scheduleProgressPoll(immediate === false ? PROGRESS_POLL_INTERVAL_MS : 0);
      }

      function refreshModelCatalog(selectedModelId) {
        if (!modelSelectEl) return Promise.resolve(null);
        if (!currentModelEffort) {
          currentModelEffort = readStoredModelEffort();
        }
        function formatModelText(modelLabelOrId) {
          return modelLabelOrId ? "Model: " + modelLabelOrId : "Model";
        }
        function appendCustomModelOption() {
          var customOption = document.createElement("option");
          customOption.value = CUSTOM_MODEL_OPTION_VALUE;
          customOption.textContent = "Model: Custom...";
          customOption.selected = selectedModelId === CUSTOM_MODEL_OPTION_VALUE;
          modelSelectEl.appendChild(customOption);
        }
        function renderCurrentOnly(modelLabelOrId) {
          modelCatalogState = null;
          modelSelectEl.innerHTML = "";
          var currentOption = document.createElement("option");
          currentOption.value = "";
          currentOption.textContent = formatModelText(modelLabelOrId);
          currentOption.selected = true;
          modelSelectEl.appendChild(currentOption);
          appendCustomModelOption();
          modelSelectEl.disabled = false;
        }
        function renderUnavailable(label) {
          modelCatalogState = null;
          modelSelectEl.innerHTML = "";
          var option = document.createElement("option");
          option.value = "";
          option.textContent = label || "Model: unavailable";
          option.selected = true;
          modelSelectEl.appendChild(option);
          appendCustomModelOption();
          modelSelectEl.disabled = false;
        }
        if (!threadId) {
          renderUnavailable("Model: unavailable");
          return Promise.resolve(null);
        }
        modelSelectEl.disabled = true;
        return window.MeridianWeb.fetchWithAuth("/api/models?thread_id=" + encodeURIComponent(threadId))
          .then(function(res) {
            return res.json().then(function(data) {
              if (!res.ok) {
                throw new Error(data && data.error ? data.error : "Failed to load models");
              }
              modelCatalogState = data;
              currentModelEffort = readStoredModelEffort();
              syncModelEffortControl(currentModelEffort);
              modelSelectEl.innerHTML = "";
              var models = Array.isArray(data.models) ? data.models : [];
              var currentModelId = typeof data.current_model_id === "string" ? data.current_model_id : "";
              if (models.length === 0) {
                if (currentModelId) {
                  renderCurrentOnly(currentModelId);
                  return data;
                }
                renderUnavailable("Model: unavailable");
                return data;
              }
              var hasCurrentModel = currentModelId
                ? models.some(function(model) { return model && model.id === currentModelId; })
                : false;
              if (currentModelId && !hasCurrentModel) {
                var unavailableOption = document.createElement("option");
                unavailableOption.value = "";
                unavailableOption.textContent = formatModelText(currentModelId);
                unavailableOption.selected = !selectedModelId;
                modelSelectEl.appendChild(unavailableOption);
              }
              var matchedSelection = false;
              models.forEach(function(model, index) {
                var option = document.createElement("option");
                option.value = model.id;
                option.textContent = "Model: " + model.label;
                if ((selectedModelId && selectedModelId === model.id) || (!selectedModelId && currentModelId === model.id)) {
                  option.selected = true;
                  matchedSelection = true;
                }
                modelSelectEl.appendChild(option);
              });
              if (!matchedSelection && modelSelectEl.options.length > 0) {
                modelSelectEl.selectedIndex = 0;
              }
              appendCustomModelOption();
              modelSelectEl.disabled = false;
              return data;
            });
          })
          .catch(function() {
            renderUnavailable("Model: unavailable");
            return null;
          });
      }

      var customGuiFilters = window.MeridianWeb.getCustomFilters("gui");

      var BUILTIN_FILTER_LABELS = [
        "Status: heartbeat, typing, connected, running, idle",

        gui: "Filters for GUI chat bubbles. Matching lines are hidden from chat view.",

      };

      function renderBuiltinFilters() {
        if (!builtinFiltersList) return;
        builtinFiltersList.innerHTML = "";
        BUILTIN_FILTER_LABELS.forEach(function(label) {

      function renderCustomFilters() {
        if (!customFiltersList) return;
        var filters = activeFilterScope === "gui" ? customGuiFilters : customInterfaceFilters;
        customFiltersList.innerHTML = "";
        if (filters.length === 0) {
          var empty = document.createElement("div");
          empty.style.cssText = "font-size:0.75rem;color:var(--text-dim);padding:0.25rem 0;";
          empty.textContent = "No custom filters yet.";
          customFiltersList.appendChild(empty);

        }
        filters.forEach(function(f, idx) {
          var row = document.createElement("div");
          row.style.cssText = "display:flex;align-items:center;gap:0.5rem;padding:0.3rem 0;border-bottom:1px solid var(--border-color);";

          var label = document.createElement("span");

          label.textContent = (f.isRegex ? "/" : "") + f.pattern + (f.isRegex ? "/" : "");
          var del = document.createElement("button");
          del.style.cssText = "background:none;border:none;color:var(--error-color);cursor:pointer;font-size:0.875rem;padding:0.125rem 0.375rem;flex-shrink:0;";
          del.textContent = "\u00d7";
          del.setAttribute("aria-label", "Remove filter");
          del.addEventListener("click", function() {
            var list = activeFilterScope === "gui" ? customGuiFilters : customInterfaceFilters;
            list.splice(idx, 1);
            saveFilters();
            renderCustomFilters();
          });
          row.appendChild(toggle);
          row.appendChild(label);

          customFiltersList.appendChild(row);

      function saveFilters() {

        window.MeridianWeb.setCustomFilters("interface", customInterfaceFilters);

      function switchFilterScope(scope) {
        activeFilterScope = scope;
        document.querySelectorAll(".filter-tab").forEach(function(tab) {
          var isActive = tab.getAttribute("data-filter-scope") === scope;
          tab.style.background = isActive ? "var(--surface-hover)" : "transparent";

          if (isActive) tab.classList.add("active");
          else tab.classList.remove("active");
        });
        if (filterScopeDesc) filterScopeDesc.textContent = SCOPE_DESCRIPTIONS[scope] || "";
        renderCustomFilters();
      }

      document.querySelectorAll(".filter-tab").forEach(function(tab) {
        tab.addEventListener("click", function() {
          switchFilterScope(this.getAttribute("data-filter-scope") || "gui");
        });
      });

      if (filtersToggleBtn) {
        filtersToggleBtn.addEventListener("click", function() {
          if (filtersModal) {
            filtersModal.classList.remove("hidden");

            renderCustomFilters();
          }
        });
      }
      if (filtersCloseBtn) {
        filtersCloseBtn.addEventListener("click", function() {
          if (filtersModal) filtersModal.classList.add("hidden");
        });
      }
      if (filtersModal) {
        filtersModal.addEventListener("click", function(e) {
          if (e.target === filtersModal) filtersModal.classList.add("hidden");
        });
      }
      if (addFilterBtn && newFilterInput) {
        addFilterBtn.addEventListener("click", function() {
          var raw = newFilterInput.value.trim();
          if (!raw) return;
          var isRegex = false;
          var pattern = raw;
          // Auto-detect /regex/ syntax
          if (raw.length > 2 && raw.charAt(0) === "/" && raw.charAt(raw.length - 1) === "/") {
            pattern = raw.slice(1, -1);
            isRegex = true;
            try { new RegExp(pattern); } catch (e) {
              alert("Invalid regex: " + e.message);
              return;
            }
          }
          var filter = { id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6), pattern: pattern, isRegex: isRegex, enabled: true };
          if (activeFilterScope === "gui") customGuiFilters.push(filter);
          else customInterfaceFilters.push(filter);
          saveFilters();
          renderCustomFilters();
          newFilterInput.value = "";
        });
        newFilterInput.addEventListener("keydown", function(e) {
          if (e.key === "Enter") { e.preventDefault(); addFilterBtn.click(); }
        });
      }

      var term = null;
      var terminalReady = false;
      var fitAddon = null;

      function fitTerminal() {
        if (fitAddon && term && terminalReady) {
          try { fitAddon.fit(); } catch (e) {}
        }
      }

      if (window.Terminal && termEl) {
        term = new window.Terminal({
          cursorBlink: true,
          theme: { background: "#000000", foreground: "#f0f2f5" },
          fontSize: 13,
          fontFamily: '"SF Mono", "Fira Code", monospace',
          allowProposedApi: true
        });
        if (window.FitAddon && window.FitAddon.FitAddon) {
          fitAddon = new window.FitAddon.FitAddon();
          term.loadAddon(fitAddon);
        }
        term.open(termEl);
        terminalReady = true;
        fitTerminal();
      } else if (termEl) {
        var fallback = document.createElement("div");
        fallback.style.cssText = "color:#94a3b8;padding:12px;font-size:12px;line-height:1.6;font-family:monospace;";
        fallback.textContent = "Terminal viewer unavailable (xterm failed to load), but chat/send/editor/files remain available.";
        termEl.appendChild(fallback);
        term = { write: function () {} };
      }

      // Live A2A stream (only when thread_id and token present; otherwise server returns 401 and pane stays empty)
      var base = window.MeridianWeb.apiBase();
      var ws = null;
      var wsReconnectAttempts = 0;
      var wsReconnectTimer = null;
      var WS_MAX_RECONNECT_ATTEMPTS = 20;
      var wsConnected = false;
      var wsUnavailable = false;
      var initialReplayLines = 200;
      var historyBootstrapPromise = fetchThreadHistory()
        .then(function(entries) {
          serverHistoryRestored = restoreServerChatHistory(entries);
          if (serverHistoryRestored) {
            if (!findLatestPendingHistoryEntry(entries)) {
              initialReplayLines = serverHistoryAuthoritative ? 0 : 200;
              return true;
            }
            return reconcileBootstrapProgress(entries).then(function() {
              initialReplayLines = serverHistoryAuthoritative ? 0 : 200;
              if (activeProgressMessageKey) {
                startProgressPolling();
              }
              return true;
            });
          }
          var restoredLocal = restoreChatHistory();
          initialReplayLines = restoredLocal ? 0 : 200;
          return restoredLocal;
        })
        .catch(function() {
          serverHistoryRestored = false;
          serverHistoryAuthoritative = false;
          var restoredLocal = restoreChatHistory();
          initialReplayLines = restoredLocal ? 0 : 200;
          return restoredLocal;
        });

      function handleWsMessage(ev) {
        try {
          var msg = JSON.parse(ev.data);
          if (msg.type === "a2a_message") {
            handleA2AMessage(msg);
            return;
          }
          if (msg.type === "pane_output" && msg.chunk) {
            if (term && typeof term.write === "function") term.write(msg.chunk);
            var suppressPaneChat = activeProgressMessageKey || hasActiveA2AStream();
            if (suppressPaneChat) {
              chatBuffer = "";
              clearTimeout(chatTimer);
              clearTimeout(chatTypingTimer);
              if (!hasActiveA2AStream()) {
                showChatTyping(false);
              }
              return;
            }
            chatBuffer += msg.chunk;
            if (maybeRenderLiveApprovalPrompt()) {
              return;
            }
            clearTimeout(chatTimer);
            clearTimeout(chatTypingTimer);
            showChatTyping(true, "Agent is responding...");
            var containsBoundary = /\n\n|(?:^|\n)(?:\$|>|#)\s/m.test(msg.chunk);
            chatTimer = setTimeout(flushChatBuffer, containsBoundary ? 240 : CHAT_FLUSH_WINDOW_MS);
            chatTypingTimer = setTimeout(function() {
              if (!runPending && !activeProgressMessageKey && !hasActiveA2AStream()) {
                showChatTyping(false);
              }
            }, 3000);
          }
        } catch (e) {}
      }

      function connectWebSocket() {
        if (!threadId || !token || wsUnavailable) return;
        var replayLines = wsReconnectAttempts > 0 ? (serverHistoryAuthoritative ? 0 : 100) : initialReplayLines;
        if (typeof EventSource === "function") {
          var streamUrl = base + "/api/a2a_stream?thread_id=" + encodeURIComponent(threadId) + "&token=" + encodeURIComponent(token) + "&replay_lines=" + replayLines;
          ws = new EventSource(streamUrl);
          ws.onopen = function() {
            wsReconnectAttempts = 0;
            wsConnected = true;
            wsUnavailable = false;
            updateAgentStatusIndicator(true);
          };
          ws.onmessage = handleWsMessage;
          ws.onerror = function() {
            wsConnected = false;
            updateAgentStatusIndicator(false);
            if (ws && ws.readyState === 2) {
              scheduleWsReconnect();
            }
          };
          return;
        }

        var url = (base.replace(/^http/, "ws")) + "/ws/terminal?thread_id=" + encodeURIComponent(threadId) + "&token=" + encodeURIComponent(token) + "&replay_lines=" + replayLines;
        ws = new WebSocket(url);
        ws.onopen = function() {
          wsReconnectAttempts = 0;
          wsConnected = true;
          wsUnavailable = false;
          updateAgentStatusIndicator(true);
        };
        ws.onmessage = handleWsMessage;
        ws.onerror = function() {
          if (!wsConnected) {
            // Optional legacy terminal stream: history/A2A delivery still works
            // when this route is absent, so do not surface it as a chat error.
            wsUnavailable = true;
            clearTimeout(wsReconnectTimer);
            updateAgentStatusIndicator(false);
          }
        };
        ws.onclose = function(ev) {
          var wasConnected = wsConnected;
          wsConnected = false;
          updateAgentStatusIndicator(false);
          if (ev.code === 1000 || ev.code === 1005) return;
          if (wsUnavailable && !wasConnected) return;
          scheduleWsReconnect();
        };
      }

      function scheduleWsReconnect() {
        if (wsReconnectAttempts >= WS_MAX_RECONNECT_ATTEMPTS) {
          addChatBubble("Connection lost after " + WS_MAX_RECONNECT_ATTEMPTS + " attempts. Refresh the page.", "agent", "", { timestamp: new Date().toISOString() });
          return;
        }
        var delay = Math.min(1000 * Math.pow(1.5, wsReconnectAttempts), 15000);
        wsReconnectAttempts++;
        clearTimeout(wsReconnectTimer);
        wsReconnectTimer = setTimeout(connectWebSocket, delay);
      }

      function updateAgentStatusIndicator(connected) {
        var statusEl = document.getElementById("agent-status");
        if (!statusEl) return;
        statusEl.style.color = connected ? "var(--success-color)" : (wsUnavailable ? "var(--text-dim)" : "var(--error-color)");
        statusEl.querySelector("div").style.background = "currentColor";
        statusEl.lastChild.textContent = connected ? " Live" : (wsUnavailable ? " History" : " Reconnecting…");
      }

      function isLiveConnectionClosed() {
        return !ws || ws.readyState === 2 || ws.readyState === 3;
      }

      historyBootstrapPromise.finally(function() {
        if (threadId && token) {
          connectWebSocket();
        } else {
          if (!threadId) addChatBubble("No session. Open this page from the hub by tapping a session card.", "agent", "", { timestamp: new Date().toISOString() });
          else if (!token) addChatBubble("Missing token. Open this page from the hub so the URL contains ?token=.", "agent", "", { timestamp: new Date().toISOString() });
        }
      });

      // Auto-reconnect on page visibility change (user returns after being away)
      document.addEventListener("visibilitychange", function() {
        if (document.visibilityState === "visible" && threadId && token && !wsUnavailable) {
          if (isLiveConnectionClosed()) {
            wsReconnectAttempts = 0;
            connectWebSocket();
          }
        }
      });

      // Auto-expand input

      function runCommand(cmd, silent) {

              err.status = res.status;

      function sendTerminalText(action) {
        return window.MeridianWeb.fetchWithAuth("/api/terminal_input", {

      function isUsageStatsPayload(content) {
        var trimmed = typeof content === "string" ? content.trim() : "";
        if (!trimmed || trimmed.charAt(0) !== "{") return false;

        try {
          var parsed = JSON.parse(trimmed);
          if (!parsed || typeof parsed !== "object" || Array.isArray(parsed)) {
            return false;
          }

          var keys = Object.keys(parsed);
          if (keys.length === 0) {
            return false;
          }

          var allowedKeys = {
            input_tokens: true,
            cached_input_tokens: true,
            output_tokens: true,
            total_tokens: true
          };
          var hasUsageField = false;

          for (var i = 0; i < keys.length; i++) {
            var key = keys[i];
            if (!allowedKeys[key] || typeof parsed[key] !== "number") {
              return false;
            }
            hasUsageField = true;
          }

          return hasUsageField;
        } catch (e) {
          return false;
        }
      }

      function resolveStructuredRunBubble(result) {
        if (!result || typeof result !== "object") return null;

        var rawContent = typeof result.content === "string" ? result.content.trim() : "";
        var summaryText = typeof result.summary_text === "string" ? result.summary_text.trim() : "";
        var detailsText = typeof result.details_text === "string" ? result.details_text.trim() : "";
        var agentReplyText = "";
        if (detailsText) {
          var replyMarker = "\n\nAgent reply:\n";
          var replyMarkerIndex = detailsText.indexOf(replyMarker);
          if (replyMarkerIndex >= 0) {
            agentReplyText = detailsText.slice(replyMarkerIndex + replyMarker.length).trim();
          } else if (detailsText.indexOf("Agent reply:\n") === 0) {
            agentReplyText = detailsText.slice("Agent reply:\n".length).trim();
          }
        }
        var lowValue = isUsageStatsPayload(rawContent);
        var content = agentReplyText || summaryText || rawContent || detailsText;

        if (!detailsText && summaryText && rawContent && rawContent !== summaryText && !lowValue) {
          detailsText = rawContent;
        }
        if (!summaryText && !detailsText && lowValue) {
          return null;
        }
        if (!content && !detailsText) {
          return null;
        }

        return {
          content: content || fallbackSummaryText,
          detailsText: detailsText,
          rawContent: rawContent,
          hasStructuredDetails: Boolean(summaryText || detailsText),
          lowValue: lowValue
        };
      }

      function shouldPreserveExistingStructuredBubble(messageKey, structuredBubble) {
        if (!messageKey || !structuredBubble || !structuredBubble.lowValue || structuredBubble.detailsText) {
          return false;
        }
        return Boolean(bubbleElementsByKey[messageKey] && bubbleElementsByKey[messageKey].parentNode);
      }

      function handleSend() {
        var cmd = cmdInput.value.trim();
        if (!cmd) return;
        if (!threadId) {
          addChatBubble("Error: No session. Open this page from the hub (click a session card).", "agent", "", { timestamp: new Date().toISOString() });
          return;
        }
        if (!window.MeridianWeb.getToken()) {
          addChatBubble("Error: Missing token. Open this page from the hub with ?token= in the URL.", "agent", "", { timestamp: new Date().toISOString() });
          return;
        }
        // Reset chat buffer for new turn — ensures 1:1 ask-to-reply
        chatBuffer = "";
        clearTimeout(chatTimer);
        clearTimeout(chatTypingTimer);
        showChatTyping(false);
        lastFocusSummarySent = "";
        lastRunResultAtMs = 0;
        runPending = true;
        clearActiveProgressBubble();

        var sendNowIso = new Date().toISOString();
        addChatBubble(cmd, "user", "", {
          caller: WEB_GUI_CALLER,
          timestamp: sendNowIso
        });
        lastSubmittedInput = cmd;
        lastSubmittedTraceId = "";
        showChatTyping(true, "Awaiting agent reply...");
        startProgressPolling();
        runCommand(cmd)
          .then(function(data) {
            runPending = false;
            stopProgressPolling();
            showChatTyping(false);
            var resultContent = data && typeof data.content === "string" ? data.content.trim() : "";
            var structuredBubble = resolveStructuredRunBubble(data);
            if (data && typeof data.trace_id === "string") {
              lastSubmittedTraceId = data.trace_id.toLowerCase();
              recordLatestTraceId(data.trace_id);
              // R-06: agent reply bubbles for this trace_id should resolve to
              // the same caller as the prompt that triggered them.
              rememberCallerForTrace(lastSubmittedTraceId, WEB_GUI_CALLER);
            }
            var a2aResult = lastSubmittedTraceId ? completedA2AResults.get(lastSubmittedTraceId) : null;
            if (a2aResult) {
              clearActiveProgressBubble();
              completedA2AResults.delete(lastSubmittedTraceId);
              lastSubmittedInput = "";
              lastSubmittedTraceId = "";
            } else {
              var shouldRenderStructuredBubble = structuredBubble && (
                structuredBubble.hasStructuredDetails ||
                !structuredBubble.lowValue ||
                !activeProgressMessageKey
              );
              if (shouldRenderStructuredBubble) {
                var bubbleTraceId = lastSubmittedTraceId || resolveTraceIdFromText(structuredBubble.rawContent || structuredBubble.content);
                var bubbleMessageKey = buildTraceMessageKey("agent", bubbleTraceId);
                var preserveExistingStructuredBubble = shouldPreserveExistingStructuredBubble(
                  bubbleMessageKey,
                  structuredBubble
                );
                if (!preserveExistingStructuredBubble) {
                  clearActiveProgressBubble();
                  lastFlushedContent = stripAnsi(structuredBubble.rawContent || structuredBubble.content);
                  addChatBubble(structuredBubble.content, "agent", structuredBubble.detailsText || "", {
                    messageKey: bubbleMessageKey,
                    timestamp: new Date().toISOString(),
                    traceId: bubbleTraceId
                  });
                }
                lastRunResultAtMs = Date.now();
                lastSubmittedInput = "";
                if (bubbleTraceId) {
                  lastSubmittedTraceId = "";
                }
              } else if (resultContent && !isUsageStatsPayload(resultContent)) {
                clearActiveProgressBubble();
                // Anchor delta computation to the structured run result so pane stream won't replay older turns in chat bubbles.
                lastFlushedContent = stripAnsi(resultContent);
                lastRunResultAtMs = Date.now();
                renderAgentContent(resultContent);
              } else if (resultContent) {
                lastRunResultAtMs = Date.now();
              }
            }
            refreshSessionList();
            // The structured run result is authoritative for completed turns.
            chatBuffer = "";
            clearTimeout(chatTimer);
            clearTimeout(chatTypingTimer);
          })
          .catch(function(err) {
            runPending = false;
            stopProgressPolling();
            clearActiveProgressBubble();
            showChatTyping(false);
            var msg = err && err.message ? err.message : "Send failed.";
            if (err && err.status === 401) msg = "Unauthorized. Refresh the page from the hub so the URL includes ?token=.";
            addChatBubble("Error: " + msg, "agent", "", { timestamp: new Date().toISOString() });
            if (navigator.vibrate) navigator.vibrate(50);
        });
        cmdInput.value = "";
        cmdInput.style.height = "auto";
        cmdInput.focus();
        if (navigator.vibrate) navigator.vibrate(5);
      }
      btnSend.addEventListener("click", function(e) { e.preventDefault(); handleSend(); });
      cmdInput.addEventListener("keydown", function(e) {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSend(); }
      });

      // File Explorer Logic
      function compareTreeNodes(a, b) {
        if (a.kind !== b.kind) return a.kind === "dir" ? -1 : 1;
        return a.name.localeCompare(b.name);
      }

      function loadExpandedDirs() {
        try {
          var raw = sessionStorage.getItem(EXPANDED_DIRS_STORAGE_KEY);
          if (!raw) return;
          var parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) return;
          expandedDirs = new Set(
            parsed.filter(function(item) {
              return typeof item === "string" && item.trim();
            })
          );
        } catch (e) {}
      }

      function saveExpandedDirs() {
        try {
          var snapshot = Array.from(expandedDirs.values()).sort();
          sessionStorage.setItem(EXPANDED_DIRS_STORAGE_KEY, JSON.stringify(snapshot));
        } catch (e) {}
      }

      function toggleExpandedDir(dirPath) {
        if (expandedDirs.has(dirPath)) expandedDirs.delete(dirPath);
        else expandedDirs.add(dirPath);
        saveExpandedDirs();
        renderFileTree(fileTreeEntries);
      }

      function ensureTreeDirNode(root, dirPath) {
        var cleaned = (dirPath || "").replace(/^\/+|\/+$/g, "");
        if (!cleaned) return root;
        var segments = cleaned.split("/");
        var cursor = root;
        var builtPath = "";
        for (var i = 0; i < segments.length; i++) {
          var segment = segments[i];
          builtPath = builtPath ? builtPath + "/" + segment : segment;
          var child = cursor.childrenMap[builtPath];
          if (!child) {
            child = {
              name: segment,
              path: builtPath,
              kind: "dir",
              children: [],
              childrenMap: {}
            };
            cursor.children.push(child);
            cursor.childrenMap[builtPath] = child;
          }
          cursor = child;
        }
        return cursor;
      }

      function buildTreeModel(entries) {
        var root = {
          name: "",
          path: "",
          kind: "dir",
          children: [],
          childrenMap: {}
        };
        entries.forEach(function(entry) {
          if (!entry || typeof entry.path !== "string" || (entry.kind !== "file" && entry.kind !== "dir")) return;
          var cleanPath = entry.path.replace(/^\/+|\/+$/g, "");
          if (!cleanPath) return;
          var parts = cleanPath.split("/");
          var parentPath = parts.slice(0, -1).join("/");
          var baseName = parts[parts.length - 1];
          var parent = ensureTreeDirNode(root, parentPath);
          if (entry.kind === "dir") {
            ensureTreeDirNode(root, cleanPath);
            return;
          }
          parent.children.push({
            name: baseName,
            path: cleanPath,
            kind: "file",
            children: []
          });
        });

        function sortChildren(node) {
          node.children.sort(compareTreeNodes);
          node.children.forEach(function(child) {
            if (child.kind === "dir") sortChildren(child);
          });
        }
        sortChildren(root);
        return root;
      }

      function createTreeIcon(kind) {
        var wrap = document.createElement("span");
        wrap.innerHTML =
          kind === "dir"
            ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>'
            : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path><polyline points="13 2 13 9 20 9"></polyline></svg>';
        var icon = wrap.firstChild;
        icon.style.width = "16px";
        icon.style.height = "16px";
        icon.style.flexShrink = "0";
        return icon;
      }

      function renderTreeNode(node, depth) {
        var nodeWrap = document.createElement("div");
        nodeWrap.className = "tree-node";

        var row = document.createElement("div");
        row.className = "tree-row";
        row.style.paddingLeft = (0.5 + depth * 0.85) + "rem";
        if (node.path === selectedFilePath) row.classList.add("active");

        if (node.kind === "dir") {
          var toggle = document.createElement("button");
          toggle.type = "button";
          toggle.className = "tree-toggle";
          var expanded = expandedDirs.has(node.path);
          toggle.setAttribute("aria-expanded", expanded ? "true" : "false");
          toggle.setAttribute("aria-label", expanded ? "Collapse directory" : "Expand directory");
          toggle.innerHTML = expanded
            ? '<svg viewBox="0 0 20 20" fill="currentColor"><path d="M5 7l5 6 5-6H5z"></path></svg>'
            : '<svg viewBox="0 0 20 20" fill="currentColor"><path d="M7 5l6 5-6 5V5z"></path></svg>';
          toggle.addEventListener("click", function(e) {
            e.preventDefault();
            e.stopPropagation();
            toggleExpandedDir(node.path);
          });
          row.appendChild(toggle);
        } else {
          var spacer = document.createElement("span");
          spacer.className = "tree-toggle-placeholder";
          row.appendChild(spacer);
        }

        row.appendChild(createTreeIcon(node.kind));
        var label = document.createElement("span");
        label.className = "tree-label";
        label.textContent = node.name;
        row.appendChild(label);

        if (node.kind === "dir") {
          row.setAttribute("role", "button");
          row.setAttribute("tabindex", "0");
          row.setAttribute("aria-expanded", expandedDirs.has(node.path) ? "true" : "false");
          row.addEventListener("click", function() {
            toggleExpandedDir(node.path);
          });
          row.addEventListener("keydown", function(event) {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              toggleExpandedDir(node.path);
            }
          });
        } else {
          row.addEventListener("click", function() {
            openFile(node.path);
          });
        }

        nodeWrap.appendChild(row);

        if (node.kind === "dir" && node.children && node.children.length > 0) {
          var childrenWrap = document.createElement("div");
          childrenWrap.className = "tree-children";
          if (expandedDirs.has(node.path)) childrenWrap.classList.add("open");
          node.children.forEach(function(child) {
            childrenWrap.appendChild(renderTreeNode(child, depth + 1));
          });
          nodeWrap.appendChild(childrenWrap);
        }

        return nodeWrap;
      }

      function renderFileTree(entries) {
        fileTree.innerHTML = "";
        if (!entries || entries.length === 0) {
          fileTree.innerHTML = '<div class="tree-item" style="opacity: 0.6;">No files found.</div>';
          return;
        }
        var model = buildTreeModel(entries);
        var fragment = document.createDocumentFragment();
        model.children.forEach(function(child) {
          fragment.appendChild(renderTreeNode(child, 0));
        });
        fileTree.appendChild(fragment);
      }

      function refreshFiles() {

              if (!res.ok) {
                throw new Error(data && data.error ? data.error : "Failed to list files");

              return Array.isArray(data) ? data : [];
            });

            fileTreeEntries = entries;
            renderFileTree(fileTreeEntries);
          })
          .catch(function() {
            fileTree.innerHTML = '<div class="tree-item" style="opacity: 0.7;">Failed to load files.</div>';

          function finish(ok) {

          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(function() { finish(true); }).catch(function() { copyFallback(); });

      var overflowPushBtn = document.getElementById("overflow-push");
      var overflowFiltersBtn = document.getElementById("overflow-filters");

      function syncOverflowFocus() {
        if (!overflowFocusBtn) return;
        overflowFocusBtn.textContent = focusModeEnabled ? "Focus ON" : "Focus OFF";
        overflowFocusBtn.classList.toggle("active", focusModeEnabled);
      }
      function syncOverflowPush() {
        if (!overflowPushBtn) return;
        overflowPushBtn.textContent = pushEnabled ? "Push ON" : "Push OFF";
        overflowPushBtn.classList.toggle("active", pushEnabled);
      }
      syncOverflowFocus();
      syncOverflowPush();

      if (overflowFocusBtn) {
        overflowFocusBtn.addEventListener("click", function(e) {
          e.preventDefault();
          closeOverflow();
          if (focusToggleBtn) focusToggleBtn.click();
          syncOverflowFocus();
        });
      }
      if (overflowPushBtn) {
        overflowPushBtn.addEventListener("click", function(e) {
          e.preventDefault();
          closeOverflow();
          if (pushToggleBtn) pushToggleBtn.click();
          setTimeout(syncOverflowPush, 300);
        });
      }
      if (overflowFiltersBtn) {
        overflowFiltersBtn.addEventListener("click", function(e) {
          e.preventDefault();
          closeOverflow();
          if (filtersToggleBtn) filtersToggleBtn.click();
        });
      }

      var resizeTimeout;
      window.addEventListener("resize", function() {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(function() {
          fitTerminal();
        }, 100);
      });

      document.getElementById("thread-label").textContent = threadId || "No session";

      (function loadRepoHeaderForThread() {
        function repoBasenameFromPath(p) {
          if (p == null || typeof p !== "string" || !String(p).trim()) return "";
          var s = String(p).replace(/[/\\]+$/, "");
          var i = Math.max(s.lastIndexOf("/"), s.lastIndexOf("\\"));
          return i >= 0 ? s.slice(i + 1) : s;
        }
        var repoWrap = document.getElementById("header-repo");
        var repoNameEl = document.getElementById("header-repo-name");
        var repoPathEl = document.getElementById("header-repo-path");
        if (!threadId || !repoWrap || !repoNameEl || !repoPathEl) return;
        if (!window.MeridianWeb || !window.MeridianWeb.fetchWithAuth) return;
        window.MeridianWeb.fetchWithAuth("/api/instances")
          .then(function (res) {
            return res.json();
          })
          .then(function (data) {
            var list = Array.isArray(data) ? data : [];
            var inst = list.find(function (x) {
              return x && x.thread_id === threadId;
            });
            var wd = inst && inst.working_dir;
            if (!wd || typeof wd !== "string" || !wd.trim()) {
              repoWrap.classList.add("hidden");
              return;
            }
            repoNameEl.textContent = repoBasenameFromPath(wd);
            repoPathEl.textContent = wd;
            repoWrap.classList.remove("hidden");
          })
          .catch(function () {
            repoWrap.classList.add("hidden");
          });
      })();

      // Always default to chat view
      switchView("chat");
      cmdInput.focus();
    });
  </script>
</body>
</html>
