<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Meridian — Instances</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --surface-color: #1e293b;
      --border-color: #334155;
      --text-color: #e2e8f0;
      --text-dim: #94a3b8;
      --accent-color: #3b82f6;
      --accent-hover: #2563eb;
      --success-color: #10b981;
      --success-hover: #059669;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .hidden { display: none !important; }

    #app {
      max-width: 64rem;
      margin: 0 auto;
      width: 100%;
      padding: 1.5rem 1rem;
    }

    header {
      margin-bottom: 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    header h1 { font-size: 1.5rem; font-weight: 700; color: #fff; }
    header p { color: var(--text-dim); font-size: 0.9375rem; }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      gap: 1rem;
    }

    .btn {
      padding: 0.625rem 1.25rem;
      border-radius: 0.5rem;
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.875rem;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-spawn { background: var(--success-color); color: white; }
    .btn-spawn:hover { background: var(--success-hover); }
    .btn-spawn:active { transform: scale(0.98); }

    .hint { color: var(--text-dim); font-size: 0.8125rem; }

    .card-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
    }

    .instance-card {
      background: var(--surface-color);
      border: 1px solid var(--border-color);
      border-radius: 0.75rem;
      padding: 1.25rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .instance-card:hover { border-color: var(--accent-color); transform: translateY(-2px); }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .thread-id { font-family: monospace; font-weight: 600; font-size: 0.9375rem; color: var(--accent-color); }
    
    .status-badge {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem 0.5rem;
      border-radius: 0.375rem;
      text-transform: uppercase;
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      color: var(--text-dim);
    }

    .status-active { color: var(--success-color); border-color: var(--success-color); }

    .card-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      font-size: 0.8125rem;
    }

    .data-item { display: flex; flex-direction: column; gap: 0.25rem; }
    .data-label { color: var(--text-dim); font-size: 0.75rem; }
    .data-value { font-weight: 500; }

    .card-footer {
      margin-top: auto;
      font-size: 0.75rem;
      color: var(--text-dim);
      border-top: 1px solid var(--border-color);
      padding-top: 0.75rem;
    }

    #empty-list {
      text-align: center;
      padding: 4rem 2rem;
      background: var(--surface-color);
      border: 1px dashed var(--border-color);
      border-radius: 1rem;
      color: var(--text-dim);
    }

    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem;
      color: var(--text-dim);
    }

    #no-token {
      background: rgba(120,53,15,0.4);
      border: 1px solid rgba(217,119,6,0.5);
      border-radius: 0.75rem;
      padding: 1.5rem;
      color: #fde68a;
      text-align: center;
    }

    #no-token code { display: block; background: var(--bg-color); padding: 0.75rem; border-radius: 0.375rem; margin-top: 1rem; font-family: monospace; }

    @media (max-width: 640px) {
      .card-list { grid-template-columns: 1fr; }
      header h1 { font-size: 1.25rem; }
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>Meridian Instances</h1>
      <p>Active agents and coding sessions</p>
    </header>

    <div id="no-token" class="hidden">
      Please provide an access token to view instances.<br>
      <code>?token=YOUR_TOKEN</code>
    </div>

    <div id="content" class="hidden">
      <div class="toolbar">
        <button id="btn-spawn" type="button" class="btn btn-spawn">+ New Session</button>
        <span id="refresh-hint" class="hint">Auto-refresh active</span>
      </div>
      
      <div id="list" class="card-list">
        <!-- Cards injected here -->
      </div>
      
      <div id="empty-list" class="hidden">
        <p>No active instances found.</p>
        <p style="font-size: 0.8125rem; margin-top: 0.5rem;">Click "+ New Session" to spawn an agent.</p>
      </div>
    </div>

    <div id="loading">
      <span>Loading sessions...</span>
    </div>
  </div>

  <script>
    /* Meridian Web GUI — shared logic (inlined) */
    (function () {
      "use strict";
      var STORAGE_KEY = "meridian_web_token";
      function getQueryParams() {
        var params = {};
        var search = typeof window.location.search === "string" ? window.location.search.slice(1) : "";
        search.split("&").forEach(function (pair) {
          var i = pair.indexOf("=");
          if (i > 0) params[decodeURIComponent(pair.slice(0, i))] = decodeURIComponent(pair.slice(i + 1));
        });
        return params;
      }
      function getToken() {
        var q = getQueryParams();
        if (q.token) return q.token.trim();
        try { var t = sessionStorage.getItem(STORAGE_KEY); return t ? t.trim() : ""; } catch (e) { return ""; }
      }
      function setToken(token) {
        try { if (token) sessionStorage.setItem(STORAGE_KEY, token); else sessionStorage.removeItem(STORAGE_KEY); } catch (e) {}
      }
      (function () { var q = getQueryParams(); if (q.token) setToken(q.token.trim()); })();
      function apiBase() {
        var origin = window.location.origin || "";
        var p = (window.location.pathname || "/").replace(/\/[^/]*$/, "") || "/";
        if (p === "/" && origin) return origin;
        return origin + (p.endsWith("/") ? p.slice(0, -1) : p);
      }
      function fetchWithAuth(url, options) {
        options = options || {};
        var headers = options.headers || {};
        if (typeof headers.append === "function" || Array.isArray(headers)) headers = {};
        var token = getToken();
        if (token) headers["Authorization"] = "Bearer " + token;
        var u = url.indexOf("/") === 0 ? apiBase() + url : url;
        return fetch(u, Object.assign({}, options, { headers: headers }));
      }
      function ensureToken() { return !!getToken(); }
      window.MeridianWeb = { getToken: getToken, setToken: setToken, apiBase: apiBase, fetchWithAuth: fetchWithAuth, ensureToken: ensureToken, getQueryParams: getQueryParams };
    })();
  </script>
  <script>
    (function () {
      var REFRESH_MS = 5000;
      var listEl = document.getElementById("list");
      var content = document.getElementById("content");
      var noToken = document.getElementById("no-token");
      var loading = document.getElementById("loading");
      var emptyList = document.getElementById("empty-list");
      var btnSpawn = document.getElementById("btn-spawn");

      function showState(hasToken, showList, isEmpty) {
        if (!hasToken) {
          noToken.classList.remove("hidden");
          content.classList.add("hidden");
          loading.classList.add("hidden");
          return;
        }
        noToken.classList.add("hidden");
        loading.classList.add("hidden");
        content.classList.remove("hidden");
        listEl.classList.toggle("hidden", isEmpty);
        emptyList.classList.toggle("hidden", !isEmpty);
      }

      function formatDate(s) {
        if (!s) return "";
        try {
          var d = new Date(s);
          return isNaN(d.getTime()) ? s : d.toLocaleString();
        } catch (e) {
          return s;
        }
      }

      function openInstance(instance) {
        var mode = (instance.mode || "").toLowerCase();
        var threadId = instance.thread_id;
        var base = window.MeridianWeb.apiBase();
        var token = window.MeridianWeb.getToken();
        var q = "?thread_id=" + encodeURIComponent(threadId) + "&token=" + encodeURIComponent(token);
        if (mode === "pane_bridge") {
          window.location.href = base + "/terminal.html" + q;
        } else {
          window.location.href = base + "/bridge.html" + q;
        }
      }

      function renderList(instances) {
        listEl.innerHTML = "";
        if (!instances || instances.length === 0) {
          showState(true, true, true);
          return;
        }
        showState(true, true, false);
        instances.forEach(function (inst) {
          var card = document.createElement("div");
          card.className = "instance-card";
          
          var statusClass = inst.status === "running" ? "status-active" : "";
          
          card.innerHTML = `
            <div class="card-header">
              <span class="thread-id">${escapeHtml(inst.thread_id)}</span>
              <span class="status-badge ${statusClass}">${escapeHtml(inst.status || "offline")}</span>
            </div>
            <div class="card-body">
              <div class="data-item">
                <span class="data-label">Type</span>
                <span class="data-value">${escapeHtml(inst.agent_type || inst.type || "—")}</span>
              </div>
              <div class="data-item">
                <span class="data-label">Mode</span>
                <span class="data-value">${escapeHtml(inst.mode || "—")}</span>
              </div>
            </div>
            <div class="card-footer">
              <span>Created: ${escapeHtml(formatDate(inst.created_at))}</span>
            </div>
          `;
          
          card.addEventListener("click", function () {
            openInstance(inst);
          });
          listEl.appendChild(card);
        });
      }

      function escapeHtml(s) {
        if (s == null) return "";
        var div = document.createElement("div");
        div.textContent = s;
        return div.innerHTML;
      }

      function fetchList() {
        if (!window.MeridianWeb.ensureToken()) {
          showState(false);
          return;
        }
        window.MeridianWeb.fetchWithAuth("/api/instances")
          .then(function (res) {
            if (res.status === 401) {
              showState(false);
              return [];
            }
            return res.json();
          })
          .then(function (data) {
            if (Array.isArray(data)) {
              renderList(data);
            } else {
              renderList([]);
            }
          })
          .catch(function () {
            showState(true, true, true);
            listEl.innerHTML = "";
          });
      }

      function spawn() {
        if (!window.MeridianWeb.ensureToken()) {
          showState(false);
          return;
        }
        btnSpawn.disabled = true;
        window.MeridianWeb.fetchWithAuth("/api/spawn", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ type: "codex", mode: "pane_bridge" })
        })
          .then(function (res) {
            return res.json().then(function (body) {
              if (res.ok) {
                fetchList();
              } else {
                alert(body.error || "Spawn failed");
              }
            });
          })
          .catch(function (e) {
            alert("Spawn failed: " + (e && e.message ? e.message : "network error"));
          })
          .finally(function () {
            btnSpawn.disabled = false;
          });
      }

      btnSpawn.addEventListener("click", spawn);
      fetchList();
      setInterval(fetchList, REFRESH_MS);
    })();
  </script>
</body>
</html>
