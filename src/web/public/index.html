<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Meridian — Hub</title>
  <link rel="stylesheet" href="layout-base.css" />
  <style>
    :root {
      --bg-color: #0b0f1a;
      --surface-color: #161b2a;
      --surface-hover: #1f2638;
      --border-color: #2d3343;
      --text-color: #f0f2f5;
      --text-dim: #94a3b8;
      --accent-color: #3b82f6;
      --accent-hover: #2563eb;
      --success-color: #10b981;
      --error-color: #ef4444;
      --safe-area-inset-top: env(safe-area-inset-top, 0px);
      --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      -webkit-tap-highlight-color: transparent;
    }

    .hidden { display: none !important; }

    header {
      padding: calc(1.5rem + var(--safe-area-inset-top)) 1.5rem 1.5rem;
      background: var(--surface-color);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-info h1 { font-size: 1.25rem; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 0.5rem; }
    .header-info p { color: var(--text-dim); font-size: 0.875rem; margin-top: 0.25rem; }

    .badge-live {
      font-size: 0.625rem;
      background: rgba(16, 185, 129, 0.1);
      color: var(--success-color);
      padding: 0.125rem 0.375rem;
      border-radius: 1rem;
      border: 1px solid rgba(16, 185, 129, 0.2);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    #app {
      flex: 1;
      padding: 1.5rem;
      width: 100%;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .overview-panel {
      background: linear-gradient(135deg, rgba(22, 27, 42, 0.96), rgba(15, 23, 42, 0.92));
      border: 1px solid var(--border-color);
      border-radius: 1.1rem;
      padding: 1.1rem 1.2rem;
      margin-bottom: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .overview-head {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .overview-title {
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
    }

    .overview-subtitle {
      margin-top: 0.2rem;
      color: var(--text-dim);
      font-size: 0.8rem;
    }

    .overview-total {
      text-align: right;
    }

    .overview-total strong {
      display: block;
      font-size: 1.4rem;
      color: #fff;
      line-height: 1;
    }

    .overview-total span {
      color: var(--text-dim);
      font-size: 0.75rem;
    }

    .log-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 0.7rem;
    }

    .log-item {
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 0.85rem;
      background: rgba(255, 255, 255, 0.03);
      padding: 0.8rem 0.9rem;
      min-width: 0;
    }

    .log-item-path {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.75rem;
      line-height: 1.4;
      color: #dbe7ff;
      word-break: break-all;
    }

    .log-item-meta {
      margin-top: 0.45rem;
      display: flex;
      justify-content: space-between;
      gap: 0.75rem;
      align-items: center;
      color: var(--text-dim);
      font-size: 0.75rem;
    }

    .log-item-size {
      color: #fff;
      font-weight: 700;
      white-space: nowrap;
    }

    .log-empty {
      color: var(--text-dim);
      font-size: 0.85rem;
      padding: 0.25rem 0;
    }

    .spawn-controls {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      flex-wrap: wrap;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.625rem;
      padding: 0.75rem 0.9rem;
      border: 1px solid var(--border-color);
      border-radius: 0.85rem;
      background: rgba(255, 255, 255, 0.02);
      color: var(--text-dim);
      font-size: 0.8125rem;
      line-height: 1.2;
      cursor: pointer;
      user-select: none;
    }

    .toggle input {
      width: 1rem;
      height: 1rem;
      margin: 0;
      accent-color: var(--accent-color);
      cursor: pointer;
    }

    .select {
      min-width: 10rem;
      padding: 0.75rem 0.9rem;
      border: 1px solid var(--border-color);
      border-radius: 0.85rem;
      background: rgba(255, 255, 255, 0.02);
      color: var(--text-color);
      font-size: 0.875rem;
    }

    .btn {
      padding: 0.75rem 1.25rem;
      border-radius: 0.75rem;
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.875rem;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary { background: var(--accent-color); color: white; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
    }

    .instance-card {
      background: var(--surface-color);
      border: 1px solid var(--border-color);
      border-radius: 1rem;
      padding: 1.25rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      position: relative;
      overflow: hidden;
      min-width: 0; /* Prevent overflow */
    }

    .instance-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: var(--accent-color);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .instance-card:hover { border-color: var(--accent-color); transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    .instance-card:hover::after { opacity: 1; }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
    }

    .thread-id {
      font-family: "SF Mono", "Fira Code", monospace;
      font-weight: 600;
      font-size: 0.8125rem;
      color: var(--accent-color);
      background: rgba(59, 130, 246, 0.1);
      padding: 0.25rem 0.5rem;
      border-radius: 0.5rem;
      word-break: break-all;
      white-space: normal;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-dot {
      width: 0.5rem;
      height: 0.5rem;
      border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
    }
    .status-dot.active { background: var(--success-color); box-shadow: 0 0 8px var(--success-color); }

    .card-secondary {
      border-top: 1px dashed var(--border-color);
      padding-top: 0.5rem;
      margin-top: -0.25rem;
    }
    .card-secondary summary {
      cursor: pointer;
      color: var(--text-dim);
      font-size: 0.75rem;
      user-select: none;
    }
    .card-secondary-body {
      margin-top: 0.5rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }
    .detail-item { display: flex; flex-direction: column; gap: 0.25rem; min-width: 0; }
    .detail-label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.025em; }
    .detail-value { font-size: 0.875rem; font-weight: 500; color: #fff; word-break: break-all; white-space: normal; overflow: hidden; text-overflow: ellipsis; }

    .card-footer {
      border-top: 1px solid var(--border-color);
      padding-top: 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      color: var(--text-dim);
      gap: 0.5rem;
    }

    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 5rem 2rem;
      gap: 1rem;
      color: var(--text-dim);
    }

    .spinner {
      width: 2.5rem;
      height: 2.5rem;
      border: 3px solid var(--border-color);
      border-top-color: var(--accent-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #empty-state {
      text-align: center;
      padding: 4rem 1.5rem;
      background: var(--surface-color);
      border: 1px dashed var(--border-color);
      border-radius: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    #empty-state p { color: var(--text-dim); }

    #auth-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 1rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      text-align: center;
      color: #fca5a5;
    }

    #auth-error code {
      display: block;
      background: rgba(0, 0, 0, 0.2);
      padding: 0.75rem;
      border-radius: 0.5rem;
      margin-top: 1rem;
      font-family: monospace;
      color: #fff;
      word-break: break-all;
    }

    /* Pull-to-refresh indicator */
    .ptr-indicator {
      text-align: center;
      padding: 0;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s, padding 0.3s;
      color: var(--text-dim);
      font-size: 0.75rem;
    }
    .ptr-indicator.active {
      max-height: 3rem;
      padding: 0.75rem;
    }
    .ptr-indicator .ptr-spinner {
      display: inline-block;
      width: 1.25rem;
      height: 1.25rem;
      border: 2px solid var(--border-color);
      border-top-color: var(--accent-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      vertical-align: middle;
      margin-right: 0.5rem;
    }

    /* Floating action button for mobile */
    .fab {
      display: none;
      position: fixed;
      bottom: calc(1.5rem + env(safe-area-inset-bottom, 0px));
      right: 1.5rem;
      width: 3.5rem;
      height: 3.5rem;
      border-radius: 50%;
      background: var(--accent-color);
      color: white;
      border: none;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
      cursor: pointer;
      z-index: 100;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .fab:active { transform: scale(0.92); }
    .fab svg { width: 24px; height: 24px; }

    @media (max-width: 640px) {
      #app { padding: 1rem; padding-bottom: 5rem; }
      .card-grid { grid-template-columns: 1fr; gap: 0.75rem; }
      header { padding: calc(1rem + var(--safe-area-inset-top)) 1rem 1rem; }
      header h1 { font-size: 1.125rem; }
      header p { font-size: 0.75rem; }
      .toolbar { margin-bottom: 1rem; gap: 0.75rem; }
      .toolbar .btn-primary { display: none; }
      .fab { display: flex; }
      .instance-card { padding: 1rem; border-radius: 0.75rem; }
      .instance-card:hover { transform: none; }
      .instance-card:active { transform: scale(0.98); background: var(--surface-hover); }
      .card-head { gap: 0.375rem; }
      .thread-id { font-size: 0.75rem; padding: 0.2rem 0.375rem; }
      .detail-value { font-size: 0.875rem; }
      .card-footer { padding-top: 0.625rem; }
      #empty-state { padding: 3rem 1rem; border-radius: 1rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-info">
      <h1>Meridian <span class="badge-live">Hub</span></h1>
      <p>Manage active coding agents</p>
    </div>
  </header>

  <div id="app">
    <div id="auth-error" class="hidden">
      <p>Access token required to view instances.</p>
      <code>?token=YOUR_TOKEN</code>
    </div>

    <div id="content" class="hidden">
      <div class="toolbar">
        <div class="spawn-controls">
          <select id="spawn-provider" class="select" aria-label="Spawn provider">
            <option value="codex">Provider: Codex</option>
            <option value="claude">Provider: Claude</option>
            <option value="gemini">Provider: Gemini</option>
            <option value="cursor">Provider: Cursor</option>
          </select>
          <button id="btn-spawn" class="btn btn-primary">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            New Session
          </button>
          <label class="toggle" for="spawn-auto-approve">
            <input id="spawn-auto-approve" type="checkbox" />
            <span>Auto-approve agent prompts</span>
          </label>
        </div>
        <div id="refresh-indicator" style="font-size: 0.75rem; color: var(--text-dim); display: flex; align-items: center; gap: 0.5rem;">
          <div class="status-dot active"></div>
          Live
        </div>
      </div>

      <section id="log-overview" class="overview-panel">
        <div class="overview-head">
          <div>
            <div class="overview-title">Log Footprint</div>
            <div id="log-overview-subtitle" class="overview-subtitle">Checking current log directory usage...</div>
          </div>
          <div class="overview-total">
            <strong id="log-total-size">--</strong>
            <span id="log-file-count">0 files</span>
          </div>
        </div>
        <div id="log-list" class="log-list">
          <div class="log-empty">Loading log sizes…</div>
        </div>
      </section>

      <div id="grid" class="card-grid">
        <!-- Cards injected here -->
      </div>
      
      <div id="empty-state" class="hidden">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--border-color)"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
        <div>
          <h3 style="margin-bottom: 0.5rem">No active sessions</h3>
          <p>Spawn an agent to start coding.</p>
        </div>
      </div>
    </div>

    <div id="loading">
      <div class="spinner"></div>
      <span>Fetching sessions...</span>
    </div>
  </div>

  <div id="ptr-indicator" class="ptr-indicator">
    <span class="ptr-spinner"></span> Refreshing...
  </div>

  <button id="fab-spawn" class="fab" aria-label="New session">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
  </button>

  <script src="app.js"></script>
  <script>
    (function () {
      var REFRESH_MS = 5000;
      var gridEl = document.getElementById("grid");
      var contentEl = document.getElementById("content");
      var authErrorEl = document.getElementById("auth-error");
      var loadingEl = document.getElementById("loading");
      var emptyStateEl = document.getElementById("empty-state");
      var btnSpawn = document.getElementById("btn-spawn");
      var logOverviewSubtitleEl = document.getElementById("log-overview-subtitle");
      var logTotalSizeEl = document.getElementById("log-total-size");
      var logFileCountEl = document.getElementById("log-file-count");
      var logListEl = document.getElementById("log-list");
      var providerEl = document.getElementById("spawn-provider");
      var autoApproveEl = document.getElementById("spawn-auto-approve");
      var SPAWN_PROVIDER_STORAGE_KEY = "meridian_spawn_provider";
      var SPAWN_AUTO_APPROVE_STORAGE_KEY = "meridian_spawn_auto_approve";

      function loadSpawnPreferences() {
        try {
          if (providerEl) {
            var savedProvider = localStorage.getItem(SPAWN_PROVIDER_STORAGE_KEY);
            if (savedProvider && providerEl.querySelector('option[value="' + savedProvider + '"]')) {
              providerEl.value = savedProvider;
            }
          }
          if (autoApproveEl) {
            autoApproveEl.checked = localStorage.getItem(SPAWN_AUTO_APPROVE_STORAGE_KEY) === "true";
          }
        } catch (e) {}
      }

      function saveSpawnPreferences() {
        try {
          if (providerEl) localStorage.setItem(SPAWN_PROVIDER_STORAGE_KEY, providerEl.value || "codex");
          if (autoApproveEl) localStorage.setItem(SPAWN_AUTO_APPROVE_STORAGE_KEY, autoApproveEl.checked ? "true" : "false");
        } catch (e) {}
      }

      function showState(state) {
        loadingEl.classList.toggle("hidden", state !== "loading");
        authErrorEl.classList.toggle("hidden", state !== "unauthorized");
        contentEl.classList.toggle("hidden", state !== "ready");
      }

      function formatDate(s) {
        if (!s) return "Just now";
        try {
          var d = new Date(s);
          if (isNaN(d.getTime())) return s;
          var now = new Date();
          var diff = (now - d) / 1000;
          if (diff < 60) return "Just now";
          if (diff < 3600) return Math.floor(diff / 60) + "m ago";
          if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
          return d.toLocaleDateString();
        } catch (e) { return s; }
      }

      function formatBytes(bytes) {
        if (typeof bytes !== "number" || !isFinite(bytes) || bytes < 0) return "0 B";
        var units = ["B", "KB", "MB", "GB", "TB"];
        var unitIndex = 0;
        var value = bytes;
        while (value >= 1024 && unitIndex < units.length - 1) {
          value = value / 1024;
          unitIndex += 1;
        }
        return (value >= 10 || unitIndex === 0 ? value.toFixed(0) : value.toFixed(1)) + " " + units[unitIndex];
      }

      function openInstance(inst) {
        var token = window.MeridianWeb.getToken();
        var q = "?thread_id=" + encodeURIComponent(inst.thread_id) + "&token=" + encodeURIComponent(token);
        window.location.href = "terminal.html" + q;
      }

      function renderGrid(instances) {
        gridEl.innerHTML = "";
        if (!instances || instances.length === 0) {
          emptyStateEl.classList.remove("hidden");
          return;
        }
        emptyStateEl.classList.add("hidden");
        
        instances.forEach(function (inst) {
          var card = document.createElement("div");
          card.className = "instance-card";
          
          var isActive = inst.status === "running";
          
          card.innerHTML = `
            <div class="card-head">
              <span class="thread-id">${escapeHtml(inst.thread_id)}</span>
              <div class="status-dot ${isActive ? "active" : ""}"></div>
            </div>
            <div class="card-footer">
              <span style="color: ${isActive ? "var(--success-color)" : "var(--text-dim)"}">${escapeHtml(inst.status || "offline")}</span>
              <span>${escapeHtml(formatDate(inst.updated_at || inst.created_at))}</span>
            </div>
            <details class="card-secondary">
              <summary>More info</summary>
              <div class="card-secondary-body">
                <div class="detail-item">
                  <span class="detail-label">Agent</span>
                  <span class="detail-value">${escapeHtml(inst.agent_type || inst.type || "—")}</span>
                </div>
                <div class="detail-item">
                  <span class="detail-label">Mode</span>
                  <span class="detail-value">${escapeHtml(inst.mode || "bridge")}</span>
                </div>
                <a class="role-link" href="http://localhost:7701/role/${encodeURIComponent(inst.thread_id)}" style="display:none">角色配置 →</a>
              </div>
            </details>
          `;
          
          var detailsEl = card.querySelector("details.card-secondary");
          var roleLinkEl = card.querySelector(".role-link");
          if (detailsEl) {
            detailsEl.addEventListener("click", function (e) { e.stopPropagation(); });
          }
          if (roleLinkEl) {
            roleLinkEl.addEventListener("click", function (e) { e.stopPropagation(); });
            fetch("http://localhost:7701/api/role/" + encodeURIComponent(inst.thread_id))
              .then(function (res) {
                if (res.ok) roleLinkEl.style.display = "flex";
              })
              .catch(function () {});
          }
          card.addEventListener("click", function () { openInstance(inst); });
          gridEl.appendChild(card);
        });
      }

      function renderLogInventory(payload) {
        var files = payload && Array.isArray(payload.files) ? payload.files : [];
        if (logTotalSizeEl) logTotalSizeEl.textContent = formatBytes(payload && payload.total_bytes || 0);
        if (logFileCountEl) logFileCountEl.textContent = files.length + " files";
        if (logOverviewSubtitleEl) {
          var root = payload && payload.root ? payload.root : "log dir";
          logOverviewSubtitleEl.textContent = "Monitoring " + root;
        }
        if (!logListEl) return;
        if (!files.length) {
          logListEl.innerHTML = '<div class="log-empty">No log files found.</div>';
          return;
        }

        logListEl.innerHTML = files.map(function (entry) {
          var updatedLabel = entry.updated_at ? formatDate(entry.updated_at) : "unknown";
          return (
            '<div class="log-item">' +
              '<div class="log-item-path">' + escapeHtml(entry.path || "") + '</div>' +
              '<div class="log-item-meta">' +
                '<span>' + escapeHtml(updatedLabel) + '</span>' +
                '<span class="log-item-size">' + escapeHtml(formatBytes(entry.size_bytes || 0)) + '</span>' +
              '</div>' +
            '</div>'
          );
        }).join("");
      }

      function escapeHtml(s) {
        if (s == null) return "";
        var div = document.createElement("div");
        div.textContent = s;
        return div.innerHTML;
      }

      function fetchList() {
        if (!window.MeridianWeb.ensureToken()) {
          showState("unauthorized");
          return;
        }
        Promise.all([
          window.MeridianWeb.fetchWithAuth("/api/instances").then(function (res) {
            if (res.status === 401) throw new Error("401");
            return res.json();
          }),
          window.MeridianWeb.fetchWithAuth("/api/logs").then(function (res) {
            if (res.status === 401) throw new Error("401");
            return res.json();
          })
        ])
          .then(function (results) {
            var data = results[0];
            var logs = results[1];
            showState("ready");
            renderGrid(Array.isArray(data) ? data : []);
            renderLogInventory(logs || { files: [], total_bytes: 0, root: "" });
          })
          .catch(function (err) {
            if (err.message === "401") showState("unauthorized");
            else {
              showState("ready");
              renderGrid([]);
              renderLogInventory({ files: [], total_bytes: 0, root: "log dir" });
            }
          });
      }

      function spawn() {
        if (!window.MeridianWeb.ensureToken()) return;
        btnSpawn.disabled = true;
        saveSpawnPreferences();
        window.MeridianWeb.fetchWithAuth("/api/spawn", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            type: providerEl && providerEl.value ? providerEl.value : "codex",
            mode: "pane_bridge",
            auto_approve: Boolean(autoApproveEl && autoApproveEl.checked)
          })
        })
          .then(function (res) {
            return res.json().then(function (body) {
              if (res.ok) fetchList();
              else alert(body.error || "Spawn failed");
            });
          })
          .catch(function (e) { alert("Network error during spawn"); })
          .finally(function () { btnSpawn.disabled = false; });
      }

      btnSpawn.addEventListener("click", spawn);
      if (providerEl) providerEl.addEventListener("change", saveSpawnPreferences);
      if (autoApproveEl) autoApproveEl.addEventListener("change", saveSpawnPreferences);

      // FAB (mobile) triggers same spawn
      var fabBtn = document.getElementById("fab-spawn");
      if (fabBtn) fabBtn.addEventListener("click", spawn);

      // Pull-to-refresh (mobile)
      var ptrIndicator = document.getElementById("ptr-indicator");
      var ptrStartY = 0;
      var ptrActive = false;
      document.addEventListener("touchstart", function(e) {
        if (window.scrollY === 0) ptrStartY = e.touches[0].clientY;
        else ptrStartY = 0;
      }, { passive: true });
      document.addEventListener("touchmove", function(e) {
        if (ptrStartY && e.touches[0].clientY - ptrStartY > 60 && window.scrollY === 0) {
          ptrActive = true;
          if (ptrIndicator) ptrIndicator.classList.add("active");
        }
      }, { passive: true });
      document.addEventListener("touchend", function() {
        if (ptrActive) {
          ptrActive = false;
          fetchList();
          if (navigator.vibrate) navigator.vibrate(10);
          setTimeout(function() {
            if (ptrIndicator) ptrIndicator.classList.remove("active");
          }, 800);
        }
        ptrStartY = 0;
      }, { passive: true });

      loadSpawnPreferences();
      fetchList();
      setInterval(fetchList, REFRESH_MS);
    })();
  </script>
</body>
</html>
